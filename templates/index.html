<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TeamIQ</title>
<meta name="theme-color" content="#1fb885">
<meta name="description" content="Multi-project team skill gap analysis with Monte Carlo simulation">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TeamIQ">
<link rel="icon" href="/favicon.ico" type="image/x-icon">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/static/pwa/icons/icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;--bg4:#252d3d;
  --border:#2e3a50;--border2:#3a4a62;
  --text:#e8eaf0;--muted:#8893a8;--faint:#4a556a;
  --teal:#1fb885;--teal2:#0d7a57;--amber:#f0a030;--red:#e05050;--blue:#4a9eff;
  --font:'Segoe UI',system-ui,sans-serif;--mono:'Consolas','SF Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;}
.shell{display:grid;grid-template-columns:220px 1fr;min-height:100vh;}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow:hidden;}
.sidebar-logo{padding:1.1rem 1.25rem .9rem;border-bottom:1px solid var(--border);flex-shrink:0;}
.brand{font-size:13px;font-weight:700;letter-spacing:.08em;color:var(--teal);text-transform:uppercase;}
.sub-brand{font-size:11px;color:var(--faint);margin-top:2px;}
.sidebar-body{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.proj-section{padding:.75rem 1rem .5rem;border-bottom:1px solid var(--border);}
.proj-section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.sec-label{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--faint);text-transform:uppercase;}
.proj-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:7px;cursor:pointer;border:1px solid transparent;transition:all .15s;margin-bottom:2px;}
.proj-item:hover{background:var(--bg3);}
.proj-item.active-proj{background:var(--bg3);border-color:var(--border);}
.proj-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.proj-name{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.proj-meta{font-size:10px;color:var(--faint);}
.proj-del{opacity:0;font-size:11px;padding:1px 5px;border:1px solid transparent;color:var(--red);background:transparent;cursor:pointer;border-radius:3px;transition:opacity .1s;}
.proj-item:hover .proj-del{opacity:1;border-color:rgba(224,80,80,.3);}
.nav-section{padding:.5rem 0;flex:1;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 1.25rem;cursor:pointer;color:var(--muted);font-size:13px;font-weight:500;border-left:2px solid transparent;transition:all .15s;user-select:none;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{color:var(--teal);border-left-color:var(--teal);background:rgba(31,184,133,.08);}
.nav-icon{font-size:15px;width:18px;text-align:center;}
.nav-group-label{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--faint);text-transform:uppercase;padding:10px 1.25rem 4px;}
.main{padding:2rem;max-width:1350px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1.25rem;}
.card-sm{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:1rem;}
.metric{background:var(--bg3);border-radius:8px;padding:1rem 1.25rem;}
.metric label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px;}
.metric .val{font-size:26px;font-weight:700;line-height:1;font-family:var(--mono);}
.metric .sub{font-size:11px;color:var(--faint);margin-top:4px;}
h2{font-size:18px;font-weight:600;margin-bottom:1.25rem;}
h3{font-size:11px;font-weight:600;margin-bottom:.75rem;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;}
.panel{display:none;}.panel.active{display:block;}
button,input,select{font-family:var(--font);}
.btn{background:var(--bg4);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;}
.btn:hover{border-color:var(--teal);color:var(--teal);}
.btn-primary{background:var(--teal2);border-color:var(--teal);color:#fff;}
.btn-primary:hover{background:var(--teal);}
.btn-danger{border-color:#c04040;color:#e06060;background:transparent;}
.btn-danger:hover{background:rgba(224,80,80,.1);}
.btn-active{background:rgba(74,158,255,.15);border-color:var(--blue);color:var(--blue);}
.btn-sm{padding:3px 9px;font-size:11px;}
input[type=text],input[type=number]{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:5px 8px;font-size:13px;outline:none;}
input[type=text]:focus,input[type=number]:focus{border-color:var(--teal);}
input[type=range]{flex:1;height:3px;accent-color:var(--teal);cursor:pointer;}
select{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:5px 8px;font-size:12px;cursor:pointer;outline:none;}
.sep{height:1px;background:var(--border);margin:1.25rem 0;}
.flex-between{display:flex;justify-content:space-between;align-items:center;}
.flex-ac{display:flex;align-items:center;gap:8px;}
.grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:1.5rem;}
.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;}
.mb15{margin-bottom:1.5rem;}.mb1{margin-bottom:1rem;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{font-size:11px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.05em;padding:6px 10px 10px;border-bottom:1px solid var(--border);text-align:left;}
th.c{text-align:center;}
td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
td.c{text-align:center;}
tr:last-child td{border-bottom:none;}
.badge{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600;}
.b-ok{background:rgba(31,184,133,.15);color:var(--teal);}
.b-med{background:rgba(240,160,48,.15);color:var(--amber);}
.b-high{background:rgba(224,80,80,.15);color:var(--red);}
.gap-bar-wrap{height:5px;border-radius:3px;background:var(--bg4);overflow:hidden;flex:1;}
.gap-fill{height:100%;border-radius:3px;}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.member-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;cursor:pointer;border:1px solid transparent;transition:all .15s;}
.member-item:hover{background:var(--bg3);}
.member-item.sel{background:var(--bg3);border-color:var(--border);}
.org-tag{font-size:10px;padding:1px 6px;border-radius:3px;background:rgba(31,184,133,.12);color:var(--teal);border:1px solid rgba(31,184,133,.25);flex-shrink:0;}
.phase-bar{height:28px;background:var(--bg3);border-radius:6px;overflow:hidden;display:flex;margin-bottom:1.25rem;}
.phase-seg{display:flex;align-items:center;justify-content:center;overflow:hidden;border-right:1px solid var(--bg);}
.phase-seg span{font-size:10px;font-weight:600;padding:0 6px;white-space:nowrap;}
.phase-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1.25rem;margin-bottom:12px;border-left:3px solid;}
.skill-toggle{display:inline-block;font-size:11px;padding:3px 9px;border-radius:5px;border:1px solid var(--border);cursor:pointer;margin:3px;color:var(--muted);background:transparent;transition:all .12s;}
.skill-toggle.on{font-weight:600;}
.skill-row{display:grid;grid-template-columns:120px 1fr 44px;align-items:center;gap:10px;margin-bottom:10px;}
.skill-label{font-size:12px;color:var(--muted);}
.slider-line{display:flex;align-items:center;gap:6px;}
.slider-hint{font-size:10px;color:var(--faint);width:32px;}
.skill-val{font-size:13px;font-weight:700;text-align:right;font-family:var(--mono);}
.timeline-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.timeline-line{width:1px;flex:1;background:var(--border);margin-top:4px;}
.tree-node{padding-left:20px;}
.tree-node-root{padding-left:0;}
.tree-row{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:7px;cursor:pointer;border:1px solid transparent;transition:all .12s;margin-bottom:2px;}
.tree-row:hover{background:var(--bg3);}
.tree-row.sel{background:var(--bg3);border-color:var(--border);}
.tree-toggle{width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--faint);cursor:pointer;flex-shrink:0;border-radius:3px;}
.tree-toggle:hover{background:var(--bg4);}
.tree-icon{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.tree-label{font-size:13px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tree-sublabel{font-size:11px;color:var(--faint);}
.node-actions{display:flex;gap:3px;opacity:0;transition:opacity .1s;}
.tree-row:hover .node-actions{opacity:1;}
#orgMapSvg{width:100%;background:var(--bg3);border-radius:10px;border:1px solid var(--border);cursor:grab;display:block;}
.project-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1.25rem;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.project-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--proj-color,#4a9eff);}
.project-card:hover{border-color:var(--border2);transform:translateY(-1px);}
.project-card.active-card{border-color:var(--proj-color,#4a9eff);}
.import-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center;}
.import-panel{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;width:640px;max-height:80vh;display:flex;flex-direction:column;}
.import-header{padding:1.25rem 1.5rem 1rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.import-body{flex:1;overflow-y:auto;padding:1rem 1.5rem;}
.import-footer{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.pick-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;transition:background .1s;}
.pick-row:hover{background:var(--bg3);}
.pick-row input[type=checkbox]{accent-color:var(--teal);width:14px;height:14px;cursor:pointer;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="shell">
  <nav class="sidebar">
    <div class="sidebar-logo">
      <div class="brand">TeamIQ</div>
      <div class="sub-brand">Multi-Project Analyzer</div>
    </div>
    <div class="sidebar-body">
      <div class="proj-section" id="sidebarProjects"></div>
      <div class="nav-section">
        <div class="nav-group-label">Global</div>
        <div class="nav-item" onclick="setTab('overview')"><span class="nav-icon">🏠</span>Overview</div>
        <div class="nav-item" onclick="setTab('orghier')"><span class="nav-icon">🏢</span>Organization</div>
        <div class="nav-group-label" id="projTabsLabel" style="margin-top:6px;">Current Project</div>
        <div class="nav-item" onclick="setTab('teams')"><span class="nav-icon">👥</span>Teams</div>
        <div class="nav-item" onclick="setTab('phases')"><span class="nav-icon">📋</span>Phases</div>
        <div class="nav-item" onclick="setTab('orgchart')"><span class="nav-icon">🔗</span>Org Chart</div>
        <div class="nav-item" onclick="setTab('bizcase')"><span class="nav-icon">💼</span>Business Case</div>
        <div class="nav-item" onclick="setTab('reqs')"><span class="nav-icon">📐</span>Requirements</div>
        <div class="nav-item" onclick="setTab('analysis')"><span class="nav-icon">📊</span>Analysis</div>
      </div>
    </div>
  </nav>
  <main class="main">
    <div id="panelOverview"  class="panel active"></div>
    <div id="panelOrgHier"   class="panel"></div>
    <div id="panelTeams"     class="panel"></div>
    <div id="panelPhases"    class="panel"></div>
    <div id="panelOrgchart"  class="panel"></div>
    <div id="panelBizcase"   class="panel"></div>
    <div id="panelReqs"      class="panel"></div>
    <div id="panelAnalysis"  class="panel"></div>
  </main>
</div>
<div id="importOverlay" style="display:none;"></div>

<script>
// ── Python-provided constants (injected at render time) ────────────────────
const ALL_SKILLS   = {{ all_skills | tojson }};
const TECH_SKILLS  = {{ tech_skills | tojson }};
const PERS_SKILLS  = {{ pers_skills | tojson }};
const ORG_TYPE_ICON  = {{ org_type_icon | safe }};
const ORG_TYPE_COLOR = {{ org_type_color | safe }};
const ORG_CHILD_TYPES= {{ org_child_types | safe }};
const DURATION_UNITS = {{ duration_units | tojson }};
const WP_STATUSES    = {{ wp_statuses | tojson }};

const PCOLS  = ['#4a9eff','#1fb885','#9b7ee8','#f0a030'];
const TCOLS  = ['#4a9eff','#1fb885','#9b7ee8','#f0a030','#e05050','#e87e5e','#50c8c8','#d4537e','#a0b840'];
const PROJ_COLORS = ['#4a9eff','#1fb885','#9b7ee8','#f0a030','#e87e5e','#50c8c8'];
const NODE_W = 175, NODE_H = 92;

// ── Local UI state (no computation here – Python owns all data) ────────────
let S = {};          // full state mirror from /api/state
let activeTab = 'overview';
let orgHierView = 'map';
let orgMapPan = {x:60,y:50}, orgMapZoom = 1, orgMapDragging = null, orgMapSelId = null;
let orgNodeDrag = null, orgConnFrom = null;
let charts = {};
let importChecked = new Set();

// ── API helpers ────────────────────────────────────────────────────────────
async function api(method, path, body){
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if(body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  return r.json();
}
const GET    = p       => api('GET',    p);
const POST   = (p, b)  => api('POST',   p, b);
const PATCH  = (p, b)  => api('PATCH',  p, b);
const DELETE = p       => api('DELETE', p);

async function loadState(){
  S = await GET('/api/state');
  renderSidebar();
}

// ── Colour helpers ─────────────────────────────────────────────────────────
const ini    = n => n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
const spCol  = p => p>=.75?'#1fb885':p>=.5?'#f0a030':'#e05050';
const scv    = v => v>=7?'#1fb885':v>=4?'#f0a030':'#e05050';
const tCol   = t => ({integration:'#4a9eff',dependency:'#f0a030',handoff:'#1fb885',reporting:'#9b7ee8'})[t]||'#4a9eff';

function ap(){ return S.projects?.find(p=>p.id===S.activeProjectId)||S.projects?.[0]; }

// ── Sidebar ────────────────────────────────────────────────────────────────
function renderSidebar(){
  const projects = S.projects||[];
  const active   = S.activeProjectId;
  document.getElementById('sidebarProjects').innerHTML = `
    <div class="proj-section-head">
      <span class="sec-label">Projects (${projects.length})</span>
      <button class="btn btn-primary" style="font-size:10px;padding:3px 8px;" onclick="addProject()">+ New</button>
    </div>
    ${projects.map(p=>`
      <div class="proj-item ${p.id===active?'active-proj':''}" onclick="switchProject('${p.id}')">
        <div class="proj-dot" style="background:${p.color};box-shadow:0 0 5px ${p.color}66;"></div>
        <div style="min-width:0;flex:1;">
          <div class="proj-name">${p.name}</div>
          <div class="proj-meta">${p.teams.length} teams · ${p.phases.length} phases</div>
        </div>
        ${projects.length>1?`<button class="proj-del" onclick="event.stopPropagation();delProject('${p.id}')">✕</button>`:''}
      </div>`).join('')}`;
  const proj = ap();
  const lbl  = document.getElementById('projTabsLabel');
  if(lbl){ lbl.textContent = proj?.name||'Current Project'; lbl.style.color = proj?.color||'var(--faint)'; }
}

// ── Tab routing ────────────────────────────────────────────────────────────
function setTab(tab){
  activeTab = tab;
  const labels = {overview:'Overview',orghier:'Organization',teams:'Teams',phases:'Phases',orgchart:'Org Chart',bizcase:'Business Case',reqs:'Requirements',analysis:'Analysis'};
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.textContent.trim()===labels[tab]));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  const pm = {overview:'panelOverview',orghier:'panelOrgHier',teams:'panelTeams',phases:'panelPhases',orgchart:'panelOrgchart',bizcase:'panelBizcase',reqs:'panelReqs',analysis:'panelAnalysis'};
  document.getElementById(pm[tab])?.classList.add('active');
  rerender(tab);
}

function rerender(tab){
  const t = tab||activeTab;
  if(t==='overview')  renderOverview();
  else if(t==='orghier')  renderOrgHier();
  else if(t==='teams')    renderTeams();
  else if(t==='phases')   renderPhases();
  else if(t==='orgchart') renderOrgChart();
  else if(t==='bizcase')  renderBizCase();
  else if(t==='reqs')     renderReqs();
  else if(t==='analysis') renderAnalysis();
}

// ════════════════════════════════════════════════════════════════════════════
// OVERVIEW
// ════════════════════════════════════════════════════════════════════════════
async function renderOverview(){
  const projects = S.projects||[];
  document.getElementById('panelOverview').innerHTML = `
    <div class="flex-between mb15">
      <div><h2 style="margin:0 0 4px;">Portfolio Overview</h2>
        <div style="font-size:12px;color:var(--muted);" id="overviewStatus">${projects.length} projects · <span class="spinner"></span> loading…</div></div>
      <div class="flex-ac">
        <button class="btn" onclick="setTab('orghier')">🏢 Organization</button>
        <button class="btn" onclick="exportProjects()" title="Export all projects to JSON">⬆ Export</button>
        <button class="btn" onclick="triggerImport()" title="Import projects from JSON">⬇ Import</button>
        <button class="btn btn-primary" onclick="addProject()">+ New Project</button>
      </div>
    </div>
    <div id="overviewCards" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:1.5rem;">
      ${projects.map(p=>`<div class="project-card" style="--proj-color:${p.color};min-height:120px;"></div>`).join('')}
    </div>
    <div class="card"><h3>Cross-project skill availability</h3>
      <div style="position:relative;height:280px;"><canvas id="crossChart"></canvas></div></div>`;

  const simRes = await POST('/api/simulate/portfolio');
  const cards = projects.map(p=>{
    const r   = simRes[p.id]||{};
    const pct = Math.round((r.overall_prob||0)*100);
    const hc  = spCol(r.overall_prob||0);
    const tw  = p.phases.reduce((a,ph)=>a+ph.weeks,0);
    const allM= p.teams.flatMap(t=>t.members);
    const maxReq={};
    p.phases.forEach(ph=>Object.entries(ph.required||{}).forEach(([sk,lv])=>{if(!maxReq[sk]||maxReq[sk]<lv)maxReq[sk]=lv;}));
    const crit=Object.entries(maxReq).filter(([sk,req])=>(r.team_exp?.[sk]||0)<req*.85).length;
    const linked=allM.filter(m=>m.orgId).length;
    return `<div class="project-card ${p.id===S.activeProjectId?'active-card':''}" style="--proj-color:${p.color};" onclick="switchProject('${p.id}');setTab('analysis')">
      <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:12px;margin-top:4px;">
        <div><div style="font-size:15px;font-weight:700;">${p.name}</div>
          <div style="font-size:11px;color:var(--faint);margin-top:3px;">${allM.length} people · ${p.teams.length} teams · ${tw}w</div></div>
        <div style="text-align:right;"><div style="font-size:24px;font-weight:700;font-family:var(--mono);color:${hc};">${pct}%</div>
          <div style="font-size:10px;color:var(--faint);">success prob.</div></div>
      </div>
      <div style="height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-bottom:12px;">
        <div style="height:100%;width:${pct}%;background:${hc};border-radius:3px;"></div></div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;">
        ${p.teams.map(t=>`<span style="font-size:11px;padding:2px 8px;border-radius:10px;background:${t.color}18;color:${t.color};font-weight:600;">${t.name}</span>`).join('')}
      </div>
      <div style="display:flex;gap:16px;">
        <div><div style="font-size:10px;color:var(--faint);">Critical gaps</div><div style="font-size:13px;font-weight:700;color:${crit>0?'#e05050':'#1fb885'};">${crit}</div></div>
        <div><div style="font-size:10px;color:var(--faint);">Interfaces</div><div style="font-size:13px;font-weight:700;">${p.connections.length}</div></div>
        <div><div style="font-size:10px;color:var(--faint);">From org</div><div style="font-size:13px;font-weight:700;color:var(--teal);">${linked}</div></div>
      </div></div>`;
  }).join('');
  document.getElementById('overviewCards').innerHTML=cards;
  const statusEl=document.getElementById('overviewStatus');
  if(statusEl) statusEl.textContent=`${projects.length} projects · ${projects.reduce((a,p)=>a+p.teams.flatMap(t=>t.members).length,0)} people`;

  // Cross-project skill chart
  const skSet=new Set();
  projects.forEach(p=>p.phases.forEach(ph=>Object.keys(ph.required||{}).forEach(sk=>skSet.add(sk))));
  const skArr=[...skSet].slice(0,10);
  dc('crossChart');
  const cc=document.getElementById('crossChart');
  if(cc&&skArr.length){
    charts.crossChart=new Chart(cc,{type:'bar',data:{labels:skArr,datasets:projects.map(p=>({
      label:p.name,
      data:skArr.map(sk=>parseFloat(((simRes[p.id]?.team_exp?.[sk])||0).toFixed(2))),
      backgroundColor:p.color+'66',borderColor:p.color,borderWidth:1,borderRadius:3
    }))},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#8893a8',font:{size:11}}}},
      scales:{x:{min:0,max:10,grid:{color:'#ffffff08'},ticks:{color:'#8893a8',font:{size:11}}},
              y:{grid:{display:false},ticks:{color:'#8893a8',font:{size:11}}}}}});
  }
}

// ORG HIERARCHY
// ════════════════════════════════════════════════════════════════════════════
const ND={org:{w:200,h:62},division:{w:178,h:58},department:{w:162,h:54},team:{w:152,h:52},person:{w:142,h:62}};
const V_GAP=70,H_GAP=22;
function ndim(t){return ND[t]||{w:152,h:52};}

function computeLayout(node,depth=0){
  const d=ndim(node.type);node._depth=depth;
  if(!node.children?.length||!node.expanded){node._w=d.w;return d.w;}
  let total=0;node.children.forEach(c=>{total+=computeLayout(c,depth+1)+H_GAP;});total-=H_GAP;
  node._w=Math.max(d.w,total);return node._w;
}
function placeLayout(node,x=0){
  const d=ndim(node.type);node._x=x+(node._w-d.w)/2;node._y=node._depth*(80+V_GAP);
  if(node.children?.length&&node.expanded){let cx=x;node.children.forEach(c=>{placeLayout(c,cx);cx+=c._w+H_GAP;});}
}

function renderOrgHier(){
  const org=S.globalOrg;
  if(!org)return;
  const totalP=flatPersons(org).length;
  document.getElementById('panelOrgHier').innerHTML=`
    <div class="flex-between mb15">
      <div><h2 style="margin:0 0 4px;">Organization</h2>
        <div style="font-size:12px;color:var(--muted);">${totalP} people · reusable across all projects</div></div>
      <div class="flex-ac">
        <button class="btn ${orgHierView==='map'?'btn-active':''}" onclick="orgHierView='map';renderOrgHier()">🗺 Map</button>
        <button class="btn ${orgHierView==='tree'?'btn-active':''}" onclick="orgHierView='tree';renderOrgHier()">🌲 Tree</button>
        <button class="btn btn-primary btn-sm" onclick="addOrgChild('${org.id}')">+ Add Division</button>
      </div>
    </div>
    ${orgHierView==='map' ? buildOrgMap(org) : buildOrgTreePanel(org)}`;
  if(orgHierView==='map') initOrgMapEvents();
}

function flatPersons(node,acc=[]){
  if(!node)return acc;
  if(node.type==='person')acc.push(node);
  (node.children||[]).forEach(c=>flatPersons(c,acc));
  return acc;
}
function flatPersonsUnder(node){
  if(!node)return[];
  if(node.type==='person')return[node];
  return(node.children||[]).flatMap(c=>flatPersonsUnder(c));
}
function findNode(node,id){
  if(!node)return null;
  if(node.id===id)return node;
  for(const c of(node.children||[])){const f=findNode(c,id);if(f)return f;}
  return null;
}

function buildOrgMap(org){
  computeLayout(org); placeLayout(org);
  let edges='',nodes='';
  function walk(node){
    const d=ndim(node.type),col=ORG_TYPE_COLOR[node.type]||'#888';
    const isSel=node.id===orgMapSelId;
    const px=node._x,py=node._y,pw=d.w,ph=d.h,cx=px+pw/2;
    if(node.children?.length&&node.expanded){
      node.children.forEach(c=>{
        const cd=ndim(c.type),ccx=c._x+cd.w/2,my=(py+ph+c._y)/2;
        edges+=`<path d="M${cx},${py+ph} C${cx},${my} ${ccx},${my} ${ccx},${c._y}" stroke="${col}55" stroke-width="1.5" fill="none" stroke-linecap="round"/>`;
        walk(c);
      });
    }
    const persons=flatPersonsUnder(node);
    let inner='';
    if(node.type==='person'){
      const topSk=ALL_SKILLS.reduce((a,sk)=>((node.skills?.[sk]?.m||0)>(node.skills?.[a]?.m||0)?sk:a),ALL_SKILLS[0]);
      const ts=node.skills?.[topSk]?.m||0;
      inner=`<circle cx="${px+22}" cy="${py+ph/2}" r="14" fill="${col}22" stroke="${col}44" stroke-width="1"/>
        <text x="${px+22}" y="${py+ph/2+4}" text-anchor="middle" fill="${col}" font-size="10" font-weight="700" font-family="Segoe UI,system-ui">${ini(node.name)}</text>
        <text x="${px+42}" y="${py+16}" fill="${col}" font-size="10" font-weight="700" font-family="Segoe UI,system-ui">${node.name.length>14?node.name.slice(0,13)+'…':node.name}</text>
        <text x="${px+42}" y="${py+28}" fill="#4a556a" font-size="9" font-family="Segoe UI,system-ui">${(node.role||'').slice(0,16)}</text>
        <rect x="${px+42}" y="${py+35}" width="${pw-50}" height="4" rx="2" fill="${col}22"/>
        <rect x="${px+42}" y="${py+35}" width="${Math.round(ts/10*(pw-50))}" height="4" rx="2" fill="${scv(ts)}88"/>`;
    } else {
      const sub=node.type==='org'?`${persons.length} people`
               :node.type==='division'?`${(node.children||[]).length} depts · ${persons.length}p`
               :node.type==='department'?`${(node.children||[]).length} teams · ${persons.length}p`
               :`${persons.length} member${persons.length!==1?'s':''}`;
      inner=`<rect x="${px}" y="${py}" width="${pw}" height="5" rx="3" fill="${col}"/>
        <rect x="${px}" y="${py+2}" width="${pw}" height="3" fill="${col}"/>
        <text x="${px+12}" y="${py+22}" fill="${col}" font-size="11" font-weight="700" font-family="Segoe UI,system-ui">${node.name.length>20?node.name.slice(0,19)+'…':node.name}</text>
        <text x="${px+12}" y="${py+37}" fill="#4a556a" font-size="9" font-family="Segoe UI,system-ui">${sub}</text>`;
    }
    const hasKids=node.children?.length>0;
    const toggle=hasKids?`<g onclick="toggleOrgNode('${node.id}')" style="cursor:pointer;">
      <circle cx="${cx}" cy="${py+ph}" r="8" fill="#1e2535" stroke="${col}66" stroke-width="1"/>
      <text x="${cx}" y="${py+ph+4}" text-anchor="middle" fill="${col}" font-size="10" font-family="Segoe UI,system-ui">${node.expanded?'−':'+'}</text>
    </g>`:'';
    nodes+=`<g class="omap-node" data-id="${node.id}" style="cursor:pointer;" onclick="orgMapSelect('${node.id}')">
      <rect x="${px}" y="${py}" width="${pw}" height="${ph}" rx="8"
        fill="${isSel?col+'25':'#1e2535'}" stroke="${isSel?col:col+'44'}" stroke-width="${isSel?2:1}"
        ${isSel?`filter="drop-shadow(0 0 10px ${col}55)"`:''}/>
      ${inner}</g>${toggle}`;
  }
  walk(org);
  let maxX=0,maxY=0;
  function measure(n){const d=ndim(n.type);maxX=Math.max(maxX,n._x+d.w+60);maxY=Math.max(maxY,n._y+d.h+80);if(n.children?.length&&n.expanded)n.children.forEach(measure);}
  measure(org);

  const sel=orgMapSelId?findNode(org,orgMapSelId):null;
  return`<div style="display:grid;grid-template-columns:1fr ${sel?'310px':'0px'};gap:${sel?'14px':'0'};transition:grid-template-columns .2s;align-items:start;">
    <div style="position:relative;">
      <div style="position:absolute;top:10px;right:10px;z-index:2;display:flex;gap:6px;">
        <button class="btn btn-sm" onclick="orgMapZoom=Math.min(2.2,orgMapZoom+.15);updateMapTransform()" title="Zoom in">+</button>
        <button class="btn btn-sm" onclick="orgMapZoom=Math.max(.25,orgMapZoom-.15);updateMapTransform()" title="Zoom out">−</button>
        <button class="btn btn-sm" onclick="orgMapPan={x:60,y:50};orgMapZoom=1;updateMapTransform()" title="Reset">⊙</button>
      </div>
      <svg id="orgMapSvg" width="100%" height="580">
        <g id="orgMapG" transform="translate(${orgMapPan.x},${orgMapPan.y}) scale(${orgMapZoom})">
          <g>${edges}</g><g>${nodes}</g>
        </g>
      </svg>
      <div style="font-size:11px;color:var(--faint);margin-top:6px;padding-left:4px;">Scroll to zoom · Drag to pan · Click node to inspect · ± to collapse</div>
    </div>
    ${sel?`<div>${buildOrgDetail(sel)}</div>`:'<div></div>'}
  </div>`;
}

function buildOrgDetail(node){
  const col=ORG_TYPE_COLOR[node.type]||'#888';
  const persons=flatPersonsUnder(node);
  const canAdd=(ORG_CHILD_TYPES[node.type]||[]).length>0;
  const isRoot=node.id===S.globalOrg?.id;
  let body=`<div class="card" style="position:sticky;top:0;">
    <div class="flex-between" style="margin-bottom:12px;">
      <div class="flex-ac">
        <div style="width:34px;height:34px;border-radius:8px;background:${col}18;color:${col};display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">${ORG_TYPE_ICON[node.type]||'●'}</div>
        <div>
          <input type="text" value="${node.name}" onchange="patchOrgNode('${node.id}',{name:this.value})" style="font-size:14px;font-weight:700;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);padding:2px 0;width:175px;outline:none;">
          <div style="font-size:11px;color:${col};margin-top:2px;">${node.type}</div>
        </div>
      </div>
      <button class="btn btn-sm" onclick="orgMapSelId=null;renderOrgHier()" style="padding:3px 7px;">✕</button>
    </div>`;
  if(node.type==='person'){
    const top5=ALL_SKILLS.map(sk=>({sk,v:node.skills?.[sk]?.m||0})).sort((a,b)=>b.v-a.v).slice(0,5);
    body+=`<input type="text" value="${node.role||''}" placeholder="Role" onchange="patchOrgNode('${node.id}',{role:this.value})" style="font-size:12px;color:var(--muted);background:transparent;border:none;border-bottom:1px solid var(--border);padding:2px 0;width:100%;outline:none;margin-bottom:10px;">
    <h3 style="margin-bottom:8px;">Top skills</h3>
    ${top5.map(({sk,v})=>`<div class="flex-ac" style="margin-bottom:7px;">
      <span style="font-size:11px;color:var(--muted);width:95px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${sk}</span>
      <div class="gap-bar-wrap"><div class="gap-fill" style="width:${v*10}%;background:${scv(v)};"></div></div>
      <span style="font-size:11px;font-weight:700;font-family:var(--mono);color:${scv(v)};min-width:24px;">${v.toFixed(1)}</span>
    </div>`).join('')}
    <div class="sep" style="margin:.75rem 0;"></div>
    <button class="btn btn-sm" onclick="orgHierView='tree';orgMapSelId='${node.id}';renderOrgHier()" style="width:100%;">✏️ Edit all skills</button>`;
  } else {
    body+=`<div style="display:flex;gap:10px;margin-bottom:10px;">
      <div class="metric" style="flex:1;padding:.7rem;"><label>People</label><div class="val" style="font-size:20px;">${persons.length}</div></div>
      ${(node.children?.length)?`<div class="metric" style="flex:1;padding:.7rem;"><label>${(ORG_CHILD_TYPES[node.type]||[''])[0]}s</label><div class="val" style="font-size:20px;">${node.children.length}</div></div>`:''}
    </div>`;
    if(persons.length){
      body+=`<h3 style="margin-bottom:7px;">People</h3><div style="max-height:180px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;">
        ${persons.map(p=>`<div class="flex-ac" style="padding:5px 8px;background:var(--bg3);border-radius:6px;cursor:pointer;" onclick="orgMapSelId='${p.id}';renderOrgHier()">
          <div class="avatar" style="width:26px;height:26px;background:${ORG_TYPE_COLOR.team}18;color:${ORG_TYPE_COLOR.team};font-size:10px;">${ini(p.name)}</div>
          <div style="min-width:0;"><div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.name}</div>
          <div style="font-size:10px;color:var(--faint);">${p.role||''}</div></div></div>`).join('')}
      </div>`;
    }
  }
  if(canAdd)body+=`<div class="sep" style="margin:.75rem 0;"></div><button class="btn btn-primary btn-sm" onclick="addOrgChild('${node.id}')" style="width:100%;">+ Add ${(ORG_CHILD_TYPES[node.type]||[''])[0]}</button>`;
  if(!isRoot)body+=`<button class="btn btn-danger btn-sm" onclick="deleteOrgNode('${node.id}')" style="width:100%;margin-top:6px;">Delete ${node.type}</button>`;
  return body+'</div>';
}

function buildOrgTreePanel(org){
  const selId=orgMapSelId;
  const selNode=selId?findNode(org,selId):org;
  function treeNode(node,isRoot=false){
    const col=ORG_TYPE_COLOR[node.type]||'#888';
    const hasCh=node.children?.length>0;
    const isSel=node.id===selId;
    const canAdd=(ORG_CHILD_TYPES[node.type]||[]).length>0;
    const persons=flatPersonsUnder(node);
    return`<div class="${isRoot?'tree-node-root':'tree-node'}">
      <div class="tree-row ${isSel?'sel':''}" onclick="orgMapSelId='${node.id}';renderOrgHier()">
        <div class="tree-toggle" onclick="event.stopPropagation();toggleOrgNode('${node.id}')">${hasCh?(node.expanded?'▾':'▸'):'&nbsp;'}</div>
        <div class="tree-icon" style="background:${col}18;color:${col};">${ORG_TYPE_ICON[node.type]||'●'}</div>
        <div style="flex:1;min-width:0;">
          <div class="tree-label">${node.name}</div>
          <div class="tree-sublabel">${node.type==='person'?(node.role||''):persons.length+' people'}</div>
        </div>
        <div class="node-actions">
          ${canAdd?`<button class="btn btn-sm" onclick="event.stopPropagation();addOrgChild('${node.id}')">+</button>`:''}
          ${!isRoot?`<button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteOrgNode('${node.id}')">✕</button>`:''}
        </div>
      </div>
      ${node.expanded&&hasCh?`<div>${node.children.map(c=>treeNode(c)).join('')}</div>`:''}
    </div>`;
  }
  const editorHtml=selNode?buildOrgEditor(selNode):`<div style="color:var(--faint);font-size:13px;padding:2rem;text-align:center;">← Select a node to edit</div>`;
  return`<div style="display:grid;grid-template-columns:300px 1fr;gap:16px;align-items:start;">
    <div class="card" style="padding:1rem;">
      <div class="flex-between" style="margin-bottom:10px;">
        <h3 style="margin:0;">Structure</h3>
        <button class="btn btn-primary btn-sm" onclick="addOrgChild('${org.id}')">+ Division</button>
      </div>
      <div class="tree-node-root">${treeNode(org,true)}</div>
    </div>
    <div>${editorHtml}</div>
  </div>`;
}

function buildOrgEditor(node){
  const col=ORG_TYPE_COLOR[node.type]||'#888';
  const persons=flatPersonsUnder(node);
  const canAdd=(ORG_CHILD_TYPES[node.type]||[]).length>0;
  const isRoot=node.id===S.globalOrg?.id;
  let html=`<div class="card">
    <div class="flex-between" style="margin-bottom:1.25rem;">
      <div class="flex-ac">
        <div style="width:36px;height:36px;border-radius:8px;background:${col}18;color:${col};display:flex;align-items:center;justify-content:center;font-size:18px;">${ORG_TYPE_ICON[node.type]||'●'}</div>
        <div>
          <input type="text" value="${node.name}" onchange="patchOrgNode('${node.id}',{name:this.value})" style="font-size:15px;font-weight:700;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);padding:2px 0;width:220px;outline:none;">
          <div style="font-size:11px;color:var(--faint);margin-top:2px;">${node.type} · ${persons.length} people below</div>
        </div>
      </div>
      ${canAdd?`<button class="btn btn-primary btn-sm" onclick="addOrgChild('${node.id}')">+ Add ${(ORG_CHILD_TYPES[node.type]||[''])[0]}</button>`:''}
    </div>`;
  if(node.type!=='person'&&node.type!=='org'){
    html+=`<div class="flex-ac" style="margin-bottom:10px;"><span style="font-size:12px;color:var(--muted);">Color:</span>
      ${TCOLS.map(c=>`<div onclick="patchOrgNode('${node.id}',{color:'${c}'})" style="width:14px;height:14px;border-radius:50%;background:${c};cursor:pointer;border:2px solid ${(node.color||'')===c?'#fff':'transparent'};"></div>`).join('')}
    </div>`;
  }
  if(node.type==='person'){
    html+=`<div style="margin-bottom:10px;">
      <input type="text" value="${node.role||''}" placeholder="Role / title" onchange="patchOrgNode('${node.id}',{role:this.value})" style="font-size:12px;color:var(--muted);background:transparent;border:none;border-bottom:1px solid var(--border);padding:2px 0;width:100%;outline:none;">
    </div>
    <h3>Technical skills</h3>
    ${TECH_SKILLS.map(sk=>orgSkillRow(node,sk)).join('')}
    <div class="sep"></div>
    <h3>Personality &amp; work style</h3>
    ${PERS_SKILLS.map(sk=>orgSkillRow(node,sk)).join('')}`;

  return html+'</div>';
}

function orgSkillRow(node,sk){
  const{m:mn,s:sg}=node.skills?.[sk]||{m:5,s:1.5};
  const uid2=`os_${node.id}_${sk.replace(/[^a-z0-9]/gi,'_')}`;

      </div>
      <div class="slider-line"><span class="slider-hint" style="color:var(--faint);">Uncert.</span>
        <input type="range" min="0.2" max="3" step="0.1" value="${sg}" oninput="patchOrgSkill('${node.id}','${sk}','s',this.value)" style="opacity:.45;">
      </div>
    </div>
    <div class="skill-val" id="${uid2}" style="color:${scv(mn)};">${mn.toFixed(1)}</div>
  </div>`;
}

function updateMapTransform(){
  const g=document.getElementById('orgMapG');
  if(g)g.setAttribute('transform',`translate(${orgMapPan.x},${orgMapPan.y}) scale(${orgMapZoom})`);
}

function initOrgMapEvents(){
  const svg=document.getElementById('orgMapSvg');if(!svg)return;
  svg.addEventListener('wheel',e=>{e.preventDefault();orgMapZoom=Math.max(.25,Math.min(2.2,orgMapZoom+(e.deltaY>0?-.1:.1)));updateMapTransform();},{passive:false});
  svg.addEventListener('mousedown',e=>{if(e.target.closest('.omap-node')||e.target.closest('circle'))return;orgMapDragging={sx:e.clientX-orgMapPan.x,sy:e.clientY-orgMapPan.y};svg.style.cursor='grabbing';});
  window.addEventListener('mousemove',e=>{if(!orgMapDragging)return;orgMapPan.x=e.clientX-orgMapDragging.sx;orgMapPan.y=e.clientY-orgMapDragging.sy;updateMapTransform();});
  window.addEventListener('mouseup',()=>{if(orgMapDragging){orgMapDragging=null;const s=document.getElementById('orgMapSvg');if(s)s.style.cursor='grab';}});
}

function renderTeams(){
  const proj=ap();if(!proj)return;
  const{teams,selTeamId,selMemberId}=proj;
  const team=teams.find(t=>t.id===selTeamId);
  const rawMember=team?.members.find(m=>m.id===selMemberId);

  const orgLookup={};
  flatPersons(S.globalOrg||{}).forEach(p=>{orgLookup[p.id]=p;});
  const resolveName=m=>m.orgId?orgLookup[m.orgId]?.name||'Linked':m.name||'Unknown';
  const resolveRole=m=>m.orgId?orgLookup[m.orgId]?.role||'':m.role||'';
  const resolveSkills=m=>m.orgId?orgLookup[m.orgId]?.skills||{}:m.skills||{};

  const teamList=teams.map(t=>`
    <div style="display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:8px;cursor:pointer;border:1px solid ${t.id===selTeamId?'var(--border)':'transparent'};background:${t.id===selTeamId?'var(--bg3)':'transparent'};transition:all .15s;margin-bottom:4px;" onclick="selectTeam('${proj.id}','${t.id}')">
      <div style="width:10px;height:10px;border-radius:50%;background:${t.color};flex-shrink:0;box-shadow:0 0 6px ${t.color}66;"></div>
      <div style="min-width:0;flex:1;"><div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${t.name}</div>
        <div style="font-size:11px;color:var(--faint);">${t.members.length} member${t.members.length!==1?'s':''}</div></div>
      <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();delTeam('${proj.id}','${t.id}')">✕</button>
    </div>`).join('');

  const memberList=team?team.members.map(m=>{
    const nm=resolveName(m),rl=resolveRole(m);
    return`<div class="member-item ${m.id===selMemberId?'sel':''}" onclick="selectMember('${proj.id}','${m.id}')">
      <div class="avatar" style="width:32px;height:32px;background:${team.color}22;color:${team.color};">${ini(nm)}</div>
      <div style="min-width:0;flex:1;"><div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${nm}</div>
        <div style="font-size:11px;color:var(--faint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${rl}</div></div>
      ${m.orgId?'<span class="org-tag">org</span>':''}

// ── Duration helpers ─────────────────────────────────────────────────────────
const TO_WEEKS = {days: 1/7, weeks: 1, months: 4.333, years: 52};
function phaseWeeks(ph){
  if(ph.value!=null && ph.unit) return ph.value * (TO_WEEKS[ph.unit]||1);
  return ph.weeks||2; // legacy
}
function durationLabel(ph){
  const v = ph.value??ph.weeks??2;
  const u = ph.unit||'weeks';
  return `${parseFloat(v)%1===0?parseInt(v):parseFloat(v).toFixed(1)} ${u}`;
}

// ── WP status colours ─────────────────────────────────────────────────────────
const WP_COLS = {not_started:'#4a556a', in_progress:'#4a9eff', complete:'#1fb885', blocked:'#e05050'};
const WP_LABELS = {not_started:'Not started', in_progress:'In progress', complete:'Complete', blocked:'Blocked'};

// ── Diagram state ─────────────────────────────────────────────────────────────
const PH_W=200, PH_H=80;
let pdDrag=null, pdConnFrom=null, pdMode='none';
let pdPan={x:20,y:20}, pdZoom=1, pdPanning=null;
let selPhaseId=null;

function _phX(ph,i){ return (ph.x!=null&&!isNaN(ph.x))?ph.x:60; }
function _phY(ph,i){ return (ph.y!=null&&!isNaN(ph.y))?ph.y:60+i*150; }

// ── Main render ───────────────────────────────────────────────────────────────
function renderPhases(){
  const proj=ap(); if(!proj) return;
  const {phases, phaseEdges=[]} = proj;
  const tw = phases.reduce((a,ph)=>a+phaseWeeks(ph),0).toFixed(1);
  const bar = phases.map((ph,i)=>`<div class="phase-seg" style="flex:${Math.max(.1,phaseWeeks(ph))};background:${PCOLS[i%4]}22;"><span style="color:${PCOLS[i%4]};">${ph.name} (${durationLabel(ph)})</span></div>`).join('');

  const cards = phases.map((ph,pi)=>phaseCard(ph,pi,proj)).join('');
  const diag  = buildPhaseDiagram(proj);

  document.getElementById('panelPhases').innerHTML=`
    <div class="flex-between mb15" style="flex-shrink:0;">
      <div><h2 style="margin:0 0 4px;">Phases</h2>
        <div class="flex-ac">
          <span style="font-size:12px;color:var(--muted);">Project:</span>
          <input type="text" value="${proj.name}" onchange="patchProject('${proj.id}',{name:this.value})" style="font-size:14px;font-weight:600;">
          <div class="flex-ac" style="gap:4px;">${PROJ_COLORS.map(c=>`<div onclick="patchProject('${proj.id}',{color:'${c}'})" style="width:13px;height:13px;border-radius:50%;background:${c};cursor:pointer;border:2px solid ${c===proj.color?'#fff':'transparent'};"></div>`).join('')}</div>
          <span style="font-size:12px;color:var(--faint);">${tw}w total</span>
        </div>
      </div>
      <button class="btn btn-primary" onclick="addPhase('${proj.id}')">+ Add Phase</button>
    </div>
    <div class="phase-bar mb15" style="flex-shrink:0;">${bar}</div>
    <div style="display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:16px;align-items:start;">
      <div style="overflow-y:auto;max-height:calc(100vh - 240px);">${cards}</div>
      <div style="position:sticky;top:0;">${diag}</div>
    </div>`;

  initPhaseDiagramEvents(proj.id);
}

// ── Phase card (recursive) ────────────────────────────────────────────────────
function phaseCard(ph, pi, proj, depth=0){
  const col   = PCOLS[pi%4];
  const isSel = ph.id===selPhaseId;
  const isFirst = pi===0, isLast = pi===(depth===0?proj.phases:proj.phases).length-1;

  // Duration input
  const durInput = `<div class="flex-ac" onclick="event.stopPropagation()">
    <input type="number" min="0.1" step="0.5" value="${ph.value??ph.weeks??2}"
      onchange="patchPhase('${proj.id}','${ph.id}',{value:parseFloat(this.value)})"
      style="width:52px;text-align:center;">
    <select onchange="patchPhase('${proj.id}','${ph.id}',{unit:this.value})" style="font-size:11px;padding:4px 6px;">
      ${DURATION_UNITS.map(u=>`<option value="${u}" ${(ph.unit||'weeks')===u?'selected':''}>${u}</option>`).join('')}
    </select>
  </div>`;

  const toggles = ALL_SKILLS.map(sk=>{
    const on=ph.required?.[sk]!==undefined;
    return `<button class="skill-toggle ${on?'on':''}" style="${on?`color:${col};border-color:${col};background:${col}18;`:''}" onclick="togglePhaseSkill('${proj.id}','${ph.id}','${sk}')">${sk}</button>`;
  }).join('');

  const sliders = Object.keys(ph.required||{}).length
    ? `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:8px;margin-top:10px;">
        ${Object.entries(ph.required||{}).map(([sk,lv])=>`<div class="flex-ac">
          <span style="font-size:11px;color:var(--muted);width:100px;flex-shrink:0;">${sk}</span>
          <input type="range" min="1" max="10" step="0.5" value="${lv}"
            oninput="updatePhaseReq('${proj.id}','${ph.id}','${sk}',this.value);this.nextElementSibling.textContent=parseFloat(this.value).toFixed(1)" style="flex:1;">
          <span style="font-size:12px;font-weight:700;min-width:24px;font-family:var(--mono);">${parseFloat(lv).toFixed(1)}</span>
        </div>`).join('')}</div>`
    : `<div style="font-size:12px;color:var(--faint);margin-top:8px;">No requirements — click skills above</div>`;

  // Work packages
  const wps = (ph.workPackages||[]).map(wp=>wpRow(wp,proj,ph)).join('');
  const wpSection = `
    <div class="sep" style="margin:.75rem 0;"></div>
    <div class="flex-between" style="margin-bottom:6px;">
      <h3 style="margin:0;font-size:10px;">Work Packages (${(ph.workPackages||[]).length})</h3>
      <button class="btn btn-sm" onclick="event.stopPropagation();addWP('${proj.id}','${ph.id}')">+ Add</button>
    </div>
    ${wps||'<div style="font-size:11px;color:var(--faint);">No work packages yet</div>'}`;

  // Subphases
  const subCards = (ph.children||[]).map((sub,si)=>phaseCard(sub,pi,proj,depth+1)).join('');
  const hasChildren = (ph.children||[]).length > 0;
  const subSection = `
    <div class="sep" style="margin:.75rem 0;"></div>
    <div class="flex-between" style="margin-bottom:6px;">
      <div class="flex-ac">
        ${hasChildren?`<button class="btn btn-sm" onclick="event.stopPropagation();togglePhaseExpanded('${proj.id}','${ph.id}')" style="padding:2px 7px;">${ph.expanded!==false?'▾':'▸'}</button>`:''}
        <h3 style="margin:0;font-size:10px;">Subphases (${(ph.children||[]).length})</h3>
      </div>
      <button class="btn btn-sm" onclick="event.stopPropagation();addSubphase('${proj.id}','${ph.id}')">+ Add</button>
    </div>
    ${ph.expanded!==false&&hasChildren?`<div style="margin-left:12px;border-left:2px solid ${col}44;padding-left:8px;">${subCards}</div>`:''}`;

  const indentStyle = depth>0 ? `margin-left:${depth*8}px;` : '';

  return `<div class="phase-card" id="phcard_${ph.id}"
      style="border-left-color:${col};cursor:pointer;${isSel?`outline:2px solid ${col};`:''} ${indentStyle}"
      onclick="selectPhase('${ph.id}')">
    <div style="display:grid;grid-template-columns:auto 1fr auto auto;gap:10px;align-items:center;margin-bottom:12px;">
      ${depth===0?`<div style="display:flex;flex-direction:column;gap:3px;">
        <button class="btn btn-sm" onclick="event.stopPropagation();movePhase('${proj.id}','${ph.id}',-1)" style="${isFirst?'opacity:.25;cursor:default;':''}">▲</button>
        <button class="btn btn-sm" onclick="event.stopPropagation();movePhase('${proj.id}','${ph.id}',1)" style="${isLast?'opacity:.25;cursor:default;':''}">▼</button>
      </div>`:'<div></div>'}
      <div class="flex-ac">
        <span style="font-size:11px;font-weight:700;color:${col};font-family:var(--mono);">${depth===0?'':''}</span>
        <input type="text" value="${ph.name}" onclick="event.stopPropagation()"
          onchange="patchPhase('${proj.id}','${ph.id}',{name:this.value})"
          style="font-size:14px;font-weight:700;flex:1;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);padding:2px 0;outline:none;">
      </div>
      ${durInput}
      <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();delPhase('${proj.id}','${ph.id}')">✕</button>
    </div>
    <div style="font-size:11px;color:var(--faint);margin-bottom:6px;">Toggle required skills:</div>
    <div>${toggles}</div>${sliders}
    ${wpSection}
    ${subSection}
  </div>`;
}

    </div>

        ${allMembers.map(m=>`<option value="${m.id}" ${wp.assignedMembers.includes(m.id)?'selected':''}>${resolveName(m)}</option>`).join('')}

// ── Diagram ───────────────────────────────────────────────────────────────────
function buildPhaseDiagram(proj){
  const {phases, phaseEdges=[]} = proj;
  phases.forEach((ph,i)=>{ ph.x=_phX(ph,i); ph.y=_phY(ph,i); });
  const phMap = Object.fromEntries(phases.map(p=>[p.id,p]));

  let edgesSvg='';
  phaseEdges.forEach(e=>{
    const f=phMap[e.from], t=phMap[e.to]; if(!f||!t) return;
    const x1=f.x+PH_W/2, y1=f.y+PH_H, x2=t.x+PH_W/2, y2=t.y, my=(y1+y2)/2;
    const col=PCOLS[phases.findIndex(p=>p.id===e.from)%4]||'#4a9eff';
    edgesSvg+=`<g class="ph-edge"><path d="M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}"
      stroke="${col}" stroke-width="2" fill="none" marker-end="url(#pharr)"
      style="cursor:pointer;" onclick="delPhaseEdge('${proj.id}','${e.id}')"/>
      <title>Click to remove connection</title></g>`;
  });

  let nodesSvg='';
  phases.forEach((ph,pi)=>{
    const col=PCOLS[pi%4];
    const isSel=ph.id===selPhaseId, isSrc=pdConnFrom===ph.id;
    const reqKeys=Object.keys(ph.required||{}).slice(0,3);
    const reqStr=reqKeys.join(', ')+(Object.keys(ph.required||{}).length>3?'…':'');
    const subCount=(ph.children||[]).length;
    const wpCount=(ph.workPackages||[]).length;
    const dur=durationLabel(ph);
    nodesSvg+=`<g class="ph-node" data-phid="${ph.id}" data-pid="${proj.id}"
        transform="translate(${ph.x},${ph.y})"
        style="cursor:${pdMode==='connecting'?'crosshair':'move'};"
        onclick="phNodeClick('${proj.id}','${ph.id}')">
      <rect width="${PH_W}" height="${PH_H}" rx="8"
        fill="${isSel||isSrc?col+'22':'#1e2535'}"
        stroke="${isSel?col:isSrc?col:col+'66'}" stroke-width="${isSel||isSrc?2.5:1.5}"
        ${isSrc?`filter="drop-shadow(0 0 8px ${col}88)"`:''}/>
      <rect width="${PH_W}" height="5" rx="8" fill="${col}"/>
      <rect width="${PH_W}" y="2" height="3" fill="${col}"/>
      <text x="12" y="24" fill="${col}" font-size="11" font-weight="700" font-family="Segoe UI,system-ui">${ph.name.length>22?ph.name.slice(0,21)+'…':ph.name}</text>
      <text x="12" y="40" fill="#8893a8" font-size="10" font-family="Segoe UI,system-ui">${dur}${reqStr?' · '+reqStr:''}</text>
      ${subCount?`<rect x="12" y="50" width="${28+subCount*4}" height="14" rx="3" fill="#4a9eff22"/>
        <text x="16" y="61" fill="#4a9eff" font-size="9" font-family="Segoe UI,system-ui">⊟ ${subCount} sub</text>`:''}
      ${wpCount?`<rect x="${subCount?48+subCount*4:12}" y="50" width="${24+wpCount*4}" height="14" rx="3" fill="#1fb88522"/>
        <text x="${subCount?52+subCount*4:16}" y="61" fill="#1fb885" font-size="9" font-family="Segoe UI,system-ui">📦 ${wpCount}</text>`:''}
      <text x="${PH_W-10}" y="${PH_H-10}" text-anchor="end" fill="${col}66" font-size="18" font-weight="700" font-family="Consolas,monospace">${pi+1}</text>
      ${isSel?`<g onclick="event.stopPropagation();delPhase('${proj.id}','${ph.id}')" transform="translate(${PH_W-18},6)" style="cursor:pointer;">
        <circle r="8" fill="#e0505044" stroke="#e0505088"/>
        <text x="0" y="4" text-anchor="middle" fill="#e05050" font-size="10">✕</text></g>`:''}
    </g>`;
  });

  const ghostSvg=`<line id="phGhost" stroke="#4a9eff" stroke-width="2" stroke-dasharray="6,3" display="none" x1="0" y1="0" x2="0" y2="0"/>`;

  return`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);">
      <span style="font-size:12px;font-weight:600;color:var(--muted);">Phase Diagram</span>
      <div class="flex-ac">
        <button class="btn btn-sm ${pdMode==='connecting'?'btn-active':''}" onclick="togglePhDiagConnMode('${proj.id}')">${pdMode==='connecting'?'● Connecting…':'⊕ Connect'}</button>
        <button class="btn btn-sm" onclick="phDiagAutoLayout('${proj.id}')">↺ Auto</button>
        <button class="btn btn-sm" onclick="pdZoom=Math.min(2,pdZoom+.15);phUpdateTransform()">+</button>
        <button class="btn btn-sm" onclick="pdZoom=Math.max(.3,pdZoom-.15);phUpdateTransform()">−</button>

        :'Drag nodes · ⊕ Connect to draw edges · Click edge to remove · Click node to select'}

}

function phUpdateTransform(){
  const g=document.getElementById('phDiagG');
  if(g) g.setAttribute('transform',`translate(${pdPan.x},${pdPan.y}) scale(${pdZoom})`);
}

function initPhaseDiagramEvents(pid){
  const svg=document.getElementById('phDiagSvg'); if(!svg) return;

  svg.querySelectorAll('.ph-node').forEach(el=>{
    el.addEventListener('mousedown',e=>{
      if(pdMode==='connecting') return;
      const phid=el.dataset.phid;
      const ph=ap()?.phases?.find(p=>p.id===phid); if(!ph) return;
      const rect=svg.getBoundingClientRect();
      const phx=_phX(ph,0), phy=_phY(ph,0);
      pdDrag={pid,phid,sx:(e.clientX-rect.left)/pdZoom-pdPan.x/pdZoom-phx,
                        sy:(e.clientY-rect.top)/pdZoom-pdPan.y/pdZoom-phy};
      e.preventDefault(); e.stopPropagation();
    });
  });

  svg.addEventListener('mousedown',e=>{
    if(e.target.closest('.ph-node')) return;
    pdPanning={sx:e.clientX-pdPan.x, sy:e.clientY-pdPan.y};
    svg.style.cursor='grabbing';
  });

  svg.addEventListener('mousemove',e=>{
    const rect=svg.getBoundingClientRect();
    const mx=(e.clientX-rect.left-pdPan.x)/pdZoom;
    const my=(e.clientY-rect.top-pdPan.y)/pdZoom;

    if(pdDrag){
      const proj=S.projects?.find(p=>p.id===pdDrag.pid);
      const ph=proj?.phases?.find(p=>p.id===pdDrag.phid); if(!ph) return;
      ph.x = mx - pdDrag.sx;
      ph.y = my - pdDrag.sy;
      _redrawPhaseDiagram(proj);
      const {pid:_pid,phid:_phid}=pdDrag;
      const _x=ph.x, _y=ph.y;
      clearTimeout(pdDrag._t);
      pdDrag._t=setTimeout(()=>PATCH(`/api/projects/${_pid}/phases/${_phid}`,{x:_x,y:_y}),400);
      return;
    }
    if(pdPanning){
      pdPan.x=e.clientX-pdPanning.sx; pdPan.y=e.clientY-pdPanning.sy;
      phUpdateTransform(); return;
    }
    if(pdMode==='connecting'&&pdConnFrom){
      const ph=ap()?.phases?.find(p=>p.id===pdConnFrom); if(!ph) return;
      const ghost=document.getElementById('phGhost'); if(!ghost) return;
      ghost.setAttribute('x1',_phX(ph,0)+PH_W/2);
      ghost.setAttribute('y1',_phY(ph,0)+PH_H/2);
      ghost.setAttribute('x2',mx); ghost.setAttribute('y2',my);
      ghost.setAttribute('display','block');
    }
  });

  svg.addEventListener('mouseup',()=>{
    pdDrag=null; pdPanning=null;
    if(pdMode!=='connecting') svg.style.cursor='grab';
  });
  svg.addEventListener('mouseleave',()=>{pdDrag=null; pdPanning=null;});
  svg.addEventListener('wheel',e=>{
    e.preventDefault();
    pdZoom=Math.max(.3,Math.min(2,pdZoom+(e.deltaY>0?-.1:.1)));
    phUpdateTransform();
  },{passive:false});
}

function _redrawPhaseDiagram(proj){
  const{phases,phaseEdges=[]}=proj;
  const phMap=Object.fromEntries(phases.map(p=>[p.id,p]));
  const nodesG=document.getElementById('phNodesG'); if(!nodesG) return;
  nodesG.querySelectorAll('.ph-node').forEach(el=>{
    const ph=phMap[el.dataset.phid]; if(!ph) return;
    el.setAttribute('transform',`translate(${_phX(ph,0)},${_phY(ph,0)})`);
  });
  const edgesG=document.getElementById('phEdgesG'); if(!edgesG) return;
  edgesG.innerHTML='';
  phaseEdges.forEach(e=>{
    const f=phMap[e.from],t=phMap[e.to]; if(!f||!t) return;
    const x1=_phX(f,0)+PH_W/2, y1=_phY(f,0)+PH_H, x2=_phX(t,0)+PH_W/2, y2=_phY(t,0), my=(y1+y2)/2;
    const col=PCOLS[phases.findIndex(p=>p.id===e.from)%4]||'#4a9eff';
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`);
    path.setAttribute('stroke',col); path.setAttribute('stroke-width','2');
    path.setAttribute('fill','none'); path.setAttribute('marker-end','url(#pharr)');
    path.style.cursor='pointer';
    path.addEventListener('click',()=>delPhaseEdge(proj.id,e.id));
    edgesG.appendChild(path);
  });
}

function selectPhase(phid){
  selPhaseId=(selPhaseId===phid?null:phid);
  renderPhases();
}

function phNodeClick(pid,phid){
  if(pdMode!=='connecting'){selectPhase(phid);return;}
  if(!pdConnFrom){
    pdConnFrom=phid;
    const g=document.getElementById('phGhost'); if(g) g.setAttribute('display','none');
    renderPhases(); return;
  }
  if(pdConnFrom===phid){pdConnFrom=null;renderPhases();return;}
  const fromId=pdConnFrom; pdConnFrom=null;
  const ghost=document.getElementById('phGhost'); if(ghost) ghost.setAttribute('display','none');
  POST(`/api/projects/${pid}/phase-edges`,{from:fromId,to:phid})
    .then(()=>loadState().then(()=>renderPhases()));
}

async function delPhaseEdge(pid,eid){
  await DELETE(`/api/projects/${pid}/phase-edges/${eid}`);
  await loadState(); renderPhases();
}

function togglePhDiagConnMode(pid){
  pdMode=pdMode==='connecting'?'none':'connecting';
  if(pdMode==='none') pdConnFrom=null;
  renderPhases();
}

async function phDiagAutoLayout(pid){
  const proj=S.projects?.find(p=>p.id===pid); if(!proj) return;
  const{phases,phaseEdges=[]}=proj;
  const inDeg=Object.fromEntries(phases.map(p=>[p.id,0]));
  phaseEdges.forEach(e=>{if(inDeg[e.to]!==undefined)inDeg[e.to]++;});
  const level={};
  const queue=phases.filter(p=>inDeg[p.id]===0).map(p=>p.id);
  queue.forEach(id=>level[id]=0);
  while(queue.length){
    const cur=queue.shift();
    phaseEdges.filter(e=>e.from===cur).forEach(e=>{
      level[e.to]=Math.max(level[e.to]||0,(level[cur]||0)+1);
      if(--inDeg[e.to]===0) queue.push(e.to);
    });
  }
  const byLevel={};
  phases.forEach(p=>{const lv=level[p.id]??0;(byLevel[lv]||(byLevel[lv]=[])).push(p.id);});
  for(const[lv,ids]of Object.entries(byLevel)){
    ids.forEach((id,col)=>{
      const ph=proj.phases.find(p=>p.id===id); if(!ph) return;
      ph.x=60+col*240; ph.y=50+parseInt(lv)*150;
    });
  }
  await Promise.all(proj.phases.map(ph=>
    PATCH(`/api/projects/${pid}/phases/${ph.id}`,{x:ph.x,y:ph.y})));
  await loadState(); renderPhases();
}

  patchConnection(pid,cid,{label});

function initProjOrgEvents(pid){
  const svg=document.getElementById('orgSvg');if(!svg)return;
  svg.querySelectorAll('.proj-node').forEach(el=>{
    el.addEventListener('mousedown',e=>{
      const proj=ap();if(proj?.orgMode==='connecting')return;
      const id=el.dataset.id,t=proj?.teams.find(t=>t.id===id);if(!t)return;
      const rect=svg.getBoundingClientRect();

      <div class="flex-between" style="margin-bottom:10px;">
        <span style="font-size:11px;font-weight:700;color:var(--teal);font-family:var(--mono);">REQ-${String(ri+1).padStart(3,'0')}</span>
        <button class="btn btn-danger btn-sm" onclick="delReq('${proj.id}','${req.id}')">✕</button>
      </div>
      <textarea rows="3" placeholder="Requirement text…"
        onchange="patchReq('${proj.id}','${req.id}',{text:this.value})"
        style="width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:8px;font-size:13px;resize:vertical;outline:none;font-family:var(--font);margin-bottom:10px;">${req.text||''}</textarea>
      <h3 style="margin-bottom:6px;">Linked work packages</h3>
      <div style="display:flex;flex-wrap:wrap;gap:6px;">
        ${allWPs.map(wp=>{const on=linked.has(wp.id);return`<label style="display:flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;border:1px solid ${on?'var(--teal)':'var(--border)'};background:${on?'rgba(31,184,133,.12)':'transparent'};cursor:pointer;font-size:11px;font-weight:${on?600:400};color:${on?'var(--teal)':'var(--muted)'};">
          <input type="checkbox" ${on?'checked':''} style="display:none;" onchange="toggleReqWP('${proj.id}','${req.id}','${wp.id}',this.checked)">
          ${wp.name}</label>`;}).join('')}
        ${allWPs.length===0?'<span style="font-size:11px;color:var(--faint);">No work packages yet</span>':''}
      </div>
    </div>`;}).join('');

  document.getElementById('panelReqs').innerHTML=`
    <div class="flex-between mb15">
      <div><h2 style="margin:0 0 4px;">Requirements</h2>
        <div style="font-size:12px;color:var(--muted);">Project: <span style="color:${proj.color};font-weight:600;">${proj.name}</span> · ${reqs.length} requirement${reqs.length!==1?'s':''}</div></div>
      <button class="btn btn-primary" onclick="addReq('${proj.id}')">+ Add Requirement</button>
    </div>
    ${reqs.length===0
      ? `<div class="card" style="text-align:center;padding:3rem;color:var(--faint);">
          <div style="font-size:32px;margin-bottom:12px;">📐</div>
          <div style="font-size:14px;margin-bottom:8px;">No requirements yet</div>
          <div style="font-size:12px;margin-bottom:16px;">Define requirements derived from the business case and link them to work packages.</div>
          <button class="btn btn-primary" onclick="addReq('${proj.id}')">+ Add First Requirement</button>
        </div>`
      : reqCards}`;
}

const addReq=(pid)=>act(()=>POST(`/api/projects/${pid}/requirements`,{}));
const delReq=(pid,rid)=>act(()=>DELETE(`/api/projects/${pid}/requirements/${rid}`));
const patchReq=(pid,rid,d)=>act(()=>PATCH(`/api/projects/${pid}/requirements/${rid}`,d));

function toggleReqWP(pid,rid,wpid,checked){
  const proj=ap();if(!proj)return;
  const req=proj.requirements?.find(r=>r.id===rid); if(!req) return;
  const linked=new Set(req.linkedWPs||[]);
  if(checked)linked.add(wpid);else linked.delete(wpid);
  req.linkedWPs=[...linked];
  act(()=>PATCH(`/api/projects/${pid}/requirements/${rid}`,{linkedWPs:req.linkedWPs}));
}

// ANALYSIS
// ════════════════════════════════════════════════════════════════════════════
async function renderAnalysis(){
  const proj=ap();if(!proj)return;
  const{teams,connections,phases}=proj;
  const allM=teams.flatMap(t=>t.members);
  const tw=phases.reduce((a,p)=>a+p.weeks,0);
  document.getElementById('panelAnalysis').innerHTML=`
    <div class="flex-between mb15">
      <div><h2 style="margin:0 0 4px;">${proj.name} — Analysis</h2>
        <div style="font-size:12px;color:var(--muted);">${teams.length} teams · ${allM.length} members · ${phases.length} phases · ${tw}w</div></div>
      <button class="btn btn-primary" onclick="renderAnalysis()">↻ Re-run</button>
    </div>
    <div id="analysisContent"><div style="padding:3rem;text-align:center;color:var(--muted);"><span class="spinner" style="display:inline-block;margin-right:8px;"></span>Running Monte Carlo simulation…</div></div>`;

  const data = await POST('/api/simulate', {projectId: proj.id, runs: 2000});
  const res  = data.combined;
  const tRes = data.teams;

  const maxReq={};phases.forEach(ph=>Object.entries(ph.required||{}).forEach(([sk,lv])=>{if(!maxReq[sk]||maxReq[sk]<lv)maxReq[sk]=lv;}));
  const gaps=Object.entries(maxReq).map(([sk,req])=>{const av=res.team_exp?.[sk]||0;return{sk,req,av,cov:Math.min(1,av/req)};}).sort((a,b)=>a.cov-b.cov);
  const crit=gaps.filter(g=>g.cov<.85).length;
  const oPct=Math.round((res.overall_prob||0)*100);
  const sc=spCol(res.overall_prob||0);

  const tCards=teams.map(t=>{
    const tr=tRes[t.id]||{};const pct=Math.round((tr.overall_prob||0)*100);const hcol=spCol(tr.overall_prob||0);
    const wk=Object.entries(maxReq).map(([sk,req])=>({sk,req,av:tr.team_exp?.[sk]||0,cov:Math.min(1,(tr.team_exp?.[sk]||0)/req)})).sort((a,b)=>a.cov-b.cov).slice(0,3);
    return`<div class="card-sm" style="border-left:3px solid ${t.color};">
      <div class="flex-between" style="margin-bottom:8px;">
        <div class="flex-ac"><div style="width:8px;height:8px;border-radius:50%;background:${t.color};"></div><span style="font-weight:700;font-size:13px;">${t.name}</span><span style="font-size:11px;color:var(--faint);">${t.members.length}m</span></div>
        <span style="font-size:18px;font-weight:700;font-family:var(--mono);color:${hcol};">${pct}%</span>
      </div>
      <div style="height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-bottom:8px;"><div style="height:100%;width:${pct}%;background:${hcol};border-radius:2px;"></div></div>
      <div style="font-size:11px;color:var(--faint);margin-bottom:3px;">Weakest skills:</div>
      ${wk.map(g=>`<div class="flex-ac" style="margin-top:4px;"><span style="font-size:11px;color:var(--muted);width:100px;flex-shrink:0;">${g.sk}</span>
        <div class="gap-bar-wrap"><div class="gap-fill" style="width:${Math.round(g.cov*100)}%;background:${g.cov>=1?'#1fb885':g.cov>=.7?'#f0a030':'#e05050'};"></div></div>
        <span style="font-size:10px;color:var(--faint);min-width:28px;">${Math.round(g.cov*100)}%</span></div>`).join('')}
    </div>`;}).join('');

  const gapRows=gaps.map(g=>{
    const bc=g.cov>=1?'#1fb885':g.cov>=.85?'#5dc890':g.cov>=.7?'#f0a030':'#e05050';
    const rb=g.cov>=.85?'b-ok':g.cov>=.7?'b-med':'b-high';
    const risk=g.cov>=1?'None':g.cov>=.85?'Low':g.cov>=.7?'Medium':'High';
    const ph=phases.filter(p=>p.required?.[g.sk]).map(p=>p.name).join(', ');
    const gap=Math.max(0,g.req-g.av);
    const contrib=teams.map(t=>{const tr2=tRes[t.id]||{};return(tr2.team_exp?.[g.sk]||0)>=1?`<span style="color:${t.color};font-size:10px;">●</span>`:null;}).filter(Boolean).join(' ');
    return`<tr><td><div style="font-weight:600;">${g.sk}</div><div style="font-size:11px;color:var(--faint);">${ph}</div></td>
      <td class="c" style="font-family:var(--mono);font-weight:700;">${g.req.toFixed(1)}</td>
      <td class="c" style="font-family:var(--mono);font-weight:700;color:${bc};">${g.av.toFixed(1)}</td>
      <td class="c" style="font-family:var(--mono);color:${gap>0?'#e05050':'#1fb885'};">${gap>0?'+'+gap.toFixed(1):'✓'}</td>
      <td><div class="flex-ac"><div class="gap-bar-wrap"><div class="gap-fill" style="width:${Math.round(Math.min(100,g.cov*100))}%;background:${bc};"></div></div><span style="font-size:11px;color:var(--muted);min-width:30px;">${Math.round(g.cov*100)}%</span></div></td>
      <td class="c"><span class="badge ${rb}">${risk}</span></td>
      <td class="c">${contrib||'—'}</td></tr>`;}).join('');

  const connRisks=connections.map(c=>{
    const ft=teams.find(t=>t.id===c.from),tt=teams.find(t=>t.id===c.to);if(!ft||!tt)return'';
    const fr=tRes[c.from]||{},tr2=tRes[c.to]||{};
    const risk=Math.min(fr.overall_prob||0,tr2.overall_prob||0);
    const overlap=ALL_SKILLS.filter(sk=>(fr.team_exp?.[sk]||0)>=7&&(tr2.team_exp?.[sk]||0)>=7);
    return`<tr><td><span style="color:${ft.color};font-weight:600;">${ft.name}</span><span style="color:var(--faint);margin:0 5px;">→</span><span style="color:${tt.color};font-weight:600;">${tt.name}</span></td>
      <td class="c"><span style="font-size:11px;padding:2px 8px;border-radius:4px;background:${tCol(c.type)}18;color:${tCol(c.type)};">${c.label||c.type}</span></td>
      <td class="c" style="font-family:var(--mono);font-weight:700;color:${spCol(risk)};">${Math.round(risk*100)}%</td>
      <td style="font-size:11px;color:var(--muted);">${overlap.slice(0,4).join(', ')||'—'}</td></tr>`;}).join('');

  const timeline=phases.map((ph,pi)=>{
    const prob=(res.phase_prob||[])[pi]||0,pct=Math.round(prob*100),col=PCOLS[pi%4];
    const phG=Object.entries(ph.required||{}).map(([sk,req])=>({sk,req,av:res.team_exp?.[sk]||0,ok:(res.team_exp?.[sk]||0)>=req}));
    const bad=phG.filter(g=>!g.ok);
    const contrib=teams.map(t=>{const tr2=tRes[t.id]||{};return Object.keys(ph.required||{}).some(sk=>(tr2.team_exp?.[sk]||0)>3)?`<span style="font-size:10px;padding:1px 7px;border-radius:10px;background:${t.color}18;color:${t.color};margin:2px;display:inline-block;">${t.name}</span>`:null;}).filter(Boolean).join('');
    return`<div style="display:grid;grid-template-columns:16px 1fr;gap:12px;margin-bottom:14px;">
      <div style="display:flex;flex-direction:column;align-items:center;"><div class="timeline-dot" style="background:${col};"></div>${pi<phases.length-1?'<div class="timeline-line"></div>':''}</div>
      <div style="padding-bottom:14px;">
        <div class="flex-between" style="margin-bottom:6px;"><div><span style="font-weight:700;font-size:14px;">${ph.name}</span><span style="font-size:12px;color:var(--muted);margin-left:8px;">${ph.weeks}w</span></div>
          <div class="flex-ac"><span style="font-size:12px;color:var(--muted);">Success:</span><span style="font-size:16px;font-weight:700;font-family:var(--mono);color:${spCol(prob)};">${pct}%</span></div></div>
        <div style="margin-bottom:5px;">${contrib}</div>
        ${bad.length?`<div style="font-size:12px;color:var(--red);background:rgba(224,80,80,.08);padding:6px 10px;border-radius:6px;border:1px solid rgba(224,80,80,.2);margin-bottom:6px;">Gaps: ${bad.map(g=>`${g.sk} (need ${g.req.toFixed(0)}, ≈${g.av.toFixed(1)})`).join(' · ')}</div>`:`<div style="font-size:12px;color:var(--teal);margin-bottom:6px;">✓ All requirements covered</div>`}
        <div>${phG.map(g=>`<span class="badge ${g.ok?'b-ok':'b-high'}" style="margin:2px;">${g.sk} ${g.ok?'✓':g.av.toFixed(1)+'/'+g.req.toFixed(0)}</span>`).join('')}</div>
      </div></div>`;}).join('');

  document.getElementById('analysisContent').innerHTML=`
    <div class="grid4">
      <div class="metric"><label>Overall success</label><div class="val" style="color:${sc};">${oPct}%</div><div class="sub">all teams combined</div></div>
      <div class="metric"><label>Teams / People</label><div class="val">${teams.length}<span style="font-size:16px;color:var(--faint);"> / ${allM.length}</span></div><div class="sub">in this project</div></div>
      <div class="metric"><label>Critical gaps</label><div class="val" style="color:${crit>0?'#e05050':'#1fb885'};">${crit}</div><div class="sub">skills &lt; 85% covered</div></div>
      <div class="metric"><label>Interfaces</label><div class="val">${connections.length}</div><div class="sub">team connections</div></div>
    </div>
    <div style="margin-bottom:1.5rem;"><h3>Per-team success</h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;">${tCards}</div></div>
    <div class="grid2 mb15">
      <div class="card"><h3>Skill coverage</h3><div style="position:relative;height:${Math.max(180,gaps.length*36+50)}px;"><canvas id="skillChart"></canvas></div></div>
      <div class="card"><h3>Phase probabilities</h3><div style="position:relative;height:${Math.max(180,phases.length*58+50)}px;"><canvas id="phaseChart"></canvas></div></div>
    </div>
    <div class="card mb15"><h3>Gap analysis</h3>
      <table><thead><tr><th>Skill</th><th class="c">Required</th><th class="c">Available</th><th class="c">Gap</th><th>Coverage</th><th class="c">Risk</th><th class="c">Teams</th></tr></thead>
      <tbody>${gapRows}</tbody></table></div>
    ${connections.length?`<div class="card mb15"><h3>Interface risk</h3>
      <table><thead><tr><th>Interface</th><th class="c">Type</th><th class="c">Joint success</th><th>Shared skills</th></tr></thead>
      <tbody>${connRisks}</tbody></table></div>`:''}
    <div class="card"><h3>Phase timeline &amp; readiness</h3>${timeline}</div>`;

  setTimeout(()=>{
    dc('skillChart');dc('phaseChart');
    const sc2=document.getElementById('skillChart');
    if(sc2)charts.skillChart=new Chart(sc2,{type:'bar',data:{labels:gaps.map(g=>g.sk),datasets:[{label:'Required',data:gaps.map(g=>g.req),backgroundColor:'#ffffff12',borderColor:'#ffffff33',borderWidth:1,borderRadius:3},{label:'Available',data:gaps.map(g=>parseFloat(g.av.toFixed(2))),backgroundColor:gaps.map(g=>g.av>=g.req?'#1fb88566':g.av/g.req>=.7?'#f0a03066':'#e0505066'),borderColor:gaps.map(g=>g.av>=g.req?'#1fb885':g.av/g.req>=.7?'#f0a030':'#e05050'),borderWidth:1,borderRadius:3}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{min:0,max:10,grid:{color:'#ffffff08'},ticks:{color:'#8893a8',font:{size:11}}},y:{grid:{display:false},ticks:{color:'#8893a8',font:{size:11}}}}}});
    const pc2=document.getElementById('phaseChart');
    if(pc2)charts.phaseChart=new Chart(pc2,{type:'bar',data:{labels:phases.map(p=>p.name),datasets:[{data:(res.phase_prob||[]).map(p=>Math.round(p*100)),backgroundColor:phases.map((_,i)=>PCOLS[i%4]+'66'),borderColor:phases.map((_,i)=>PCOLS[i%4]),borderWidth:1,borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{min:0,max:100,grid:{color:'#ffffff08'},ticks:{color:'#8893a8',font:{size:11},callback:v=>v+'%'}},y:{grid:{display:false},ticks:{color:'#8893a8',font:{size:11}}}}}});
  },80);
}
