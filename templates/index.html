// ── Gantt bar resize (drag right edge) ────────────────────────────────────────
function initGanttBarResizeEvents(){
  if(ganttBarResizeSetup)return;
  ganttBarResizeSetup=true;
  document.addEventListener('mousedown',e=>{
    const h=e.target.closest?.('.g-resize');if(!h)return;
    e.preventDefault();e.stopPropagation();
    const DAY_W=Math.max(3,Math.round(14*ganttZoom));
    ganttBarResizeDrag={phid:h.dataset.phid,pid:h.dataset.pid,
      startDays:parseFloat(h.dataset.days),startX:e.clientX,DAY_W,currentDays:parseFloat(h.dataset.days)};
  });
  window.addEventListener('mousemove',e=>{
    if(!ganttBarResizeDrag)return;
    const{startX,startDays,DAY_W}=ganttBarResizeDrag;
    ganttBarResizeDrag.currentDays=Math.max(1,startDays+(e.clientX-startX)/DAY_W);
    // Live visual update
    const g=document.querySelector(`[data-gbar="${ganttBarResizeDrag.phid}"]`);
    if(!g)return;
    const rects=[...g.querySelectorAll('rect')];
    const bar=rects[0];if(!bar)return;
    const newW=Math.max(4,Math.round(ganttBarResizeDrag.currentDays*DAY_W));
    bar.setAttribute('width',newW);
    const handle=g.querySelector('.g-resize');
    if(handle)handle.setAttribute('x',parseFloat(bar.getAttribute('x'))+Math.max(0,newW-7));
  });
  window.addEventListener('mouseup',async()=>{
    if(!ganttBarResizeDrag)return;
    const{phid,pid,currentDays}=ganttBarResizeDrag;
    ganttBarResizeDrag=null;
    const{value,unit}=daysToValueUnit(currentDays);
    await PATCH(`/api/projects/${pid}/phases/${phid}`,{value,unit});
    await loadState();renderTimeline();
  });
}

function renderTimeline(){
  const proj=ap();if(!proj)return;
  const startDateStr=proj.startDate||new Date().toISOString().slice(0,10);
  const startMs=new Date(startDateStr).getTime();
  const {rows,totalDays}=buildGanttRows(proj);

  const ROW_H=34,LABEL_W=224,DAY_W=Math.max(3,Math.round(14*ganttZoom));
  const HEADER_H=44;
  const svgW=Math.max(600,Math.ceil(totalDays*DAY_W)+60);
  const svgH=rows.length*ROW_H;
  const dx=d=>Math.round(d*DAY_W);
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  const tickDays=DAY_W>=12?7:DAY_W>=6?14:30;

  let headerSvg='',gridLines='';
  let d=0,lastMonth=-1;
  while(d<=totalDays+tickDays){
    const date=new Date(startMs+d*86400000);
    const month=date.getMonth(),x=dx(d);
    if(month!==lastMonth){
      lastMonth=month;
      headerSvg+=`<text x="${x+3}" y="15" fill="var(--muted)" font-size="10" font-weight="600" font-family="var(--font)">${MONTHS[month]} ${date.getFullYear()}</text>
        <line x1="${x}" y1="0" x2="${x}" y2="${HEADER_H}" stroke="var(--border2)" stroke-width="1"/>`;
      gridLines+=`<line x1="${x}" y1="0" x2="${x}" y2="${svgH}" stroke="var(--border2)" stroke-width="0.8"/>`;
    }
    if(tickDays<=14&&d>0){
      const wn=Math.ceil(d/7);
      headerSvg+=`<text x="${x+2}" y="32" fill="var(--faint)" font-size="9" font-family="var(--mono)">W${wn}</text>
        <line x1="${x}" y1="20" x2="${x}" y2="${HEADER_H}" stroke="var(--border)" stroke-width="0.5"/>`;
      gridLines+=`<line x1="${x}" y1="0" x2="${x}" y2="${svgH}" stroke="var(--border)" stroke-width="0.4" stroke-dasharray="2,5" opacity="0.5"/>`;
    }
    d+=tickDays;
  }

  // Today marker
  const todayDay=Math.round((Date.now()-startMs)/86400000);
  const todayMarker=(todayDay>=0&&todayDay<=totalDays+60)?
    `<line x1="${dx(todayDay)}" y1="0" x2="${dx(todayDay)}" y2="${svgH}" stroke="#e05050" stroke-width="1.5" opacity="0.75"/>
     <polygon points="${dx(todayDay)-4},0 ${dx(todayDay)+4},0 ${dx(todayDay)},6" fill="#e05050" opacity="0.75"/>`:'';

  // ── Build rows ───────────────────────────────────────────────────────────────
  // Inline action button style (shared)
  const aBtnStyle=`background:none;border:none;cursor:pointer;padding:1px 4px;font-size:11px;line-height:1;border-radius:3px;`;
  let labelRows='',rowsSvg='';

  rows.forEach((row,i)=>{
    const y=i*ROW_H,midY=ROW_H/2,barY=4,barH=ROW_H-8;
    const x1=dx(row.startDay),barW=Math.max(4,dx(row.endDay)-x1);
    const {col}=row;
    const stripe=i%2===1;

    if(stripe) rowsSvg+=`<rect x="0" y="${y}" width="${svgW}" height="${ROW_H}" fill="rgba(255,255,255,0.018)"/>`;

    if(row.type==='phase'){
      const isSel=ganttSelId===row.ph.id;
      const hasKids=(row.ph.children||[]).length>0||(row.ph.workPackages||[]).length>0;
      const toggle=ganttCollapsed.has(row.ph.id)?'▸':'▾';
      rowsSvg+=`<g transform="translate(0,${y})" data-gbar="${row.ph.id}">
        <rect x="${x1}" y="${barY}" width="${barW}" height="${barH}" rx="4"
          fill="${col}${isSel?'40':'28'}" stroke="${col}" stroke-width="${isSel?2.5:1.5}"/>
        ${barW>44?`<text x="${x1+7}" y="${midY+4}" fill="${col}" font-size="11" font-weight="600"
          font-family="var(--font)" style="pointer-events:none"
          >${row.ph.name.length>Math.floor(barW/7)?row.ph.name.slice(0,Math.floor(barW/7))+'…':row.ph.name}</text>`:''}
        <rect class="g-resize" data-phid="${row.ph.id}" data-pid="${proj.id}" data-days="${row.endDay-row.startDay}"
          x="${x1+Math.max(0,barW-8)}" y="${barY}" width="8" height="${barH}" rx="2"
          fill="${col}55" style="cursor:ew-resize;" title="Drag to resize"/>
      </g>`;
      labelRows+=`<div style="height:${ROW_H}px;display:flex;align-items:center;padding-left:6px;
          border-bottom:1px solid var(--border);gap:3px;cursor:pointer;
          background:${isSel?col+'18':stripe?'rgba(255,255,255,0.018)':'transparent'};
          border-left:${isSel?`2px solid ${col}`:'2px solid transparent'};"
        ondblclick="openGanttDetail('${row.ph.id}','phase')"
        onmouseenter="this.querySelector('.gla').style.display='flex'"
        onmouseleave="this.querySelector('.gla').style.display='none'">
        <span style="font-size:10px;color:var(--muted);width:12px;flex-shrink:0;"
          onclick="event.stopPropagation();toggleGanttRow('${row.ph.id}')">${hasKids?toggle:''}</span>
        <div style="width:9px;height:9px;border-radius:2px;background:${col};flex-shrink:0;"></div>
        <span style="font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;
          text-overflow:ellipsis;flex:1;min-width:0;" title="${row.ph.name}">${row.ph.name}</span>
        <div class="gla" style="display:none;align-items:center;gap:1px;flex-shrink:0;">
          <button onclick="event.stopPropagation();addSubphase('${proj.id}','${row.ph.id}')"
            title="Add subphase" style="${aBtnStyle}color:var(--teal)">⊕</button>
          <button onclick="event.stopPropagation();addWP('${proj.id}','${row.ph.id}')"
            title="Add work package" style="${aBtnStyle}color:var(--muted)">📦</button>
          <button onclick="event.stopPropagation();delPhase('${proj.id}','${row.ph.id}')"
            title="Delete" style="${aBtnStyle}color:var(--red)">✕</button>
        </div>
      </div>`;

    } else if(row.type==='subphase'){
      const isSel=ganttSelId===row.ph.id;
      const indent=row.depth*14;
      const hasKids=(row.ph.children||[]).length>0||(row.ph.workPackages||[]).length>0;
      const toggle=ganttCollapsed.has(row.ph.id)?'▸':'▾';
      rowsSvg+=`<g transform="translate(0,${y})" data-gbar="${row.ph.id}">
        <rect x="${x1}" y="${barY+3}" width="${barW}" height="${barH-6}" rx="3"
          fill="${col}${isSel?'30':'18'}" stroke="${col}${isSel?'':'99'}" stroke-width="${isSel?1.5:1}"/>
        ${barW>38?`<text x="${x1+5}" y="${midY+3}" fill="${col}cc" font-size="10"
          font-family="var(--font)" style="pointer-events:none"
          >${row.ph.name.length>Math.floor(barW/6.5)?row.ph.name.slice(0,Math.floor(barW/6.5))+'…':row.ph.name}</text>`:''}
        <rect class="g-resize" data-phid="${row.ph.id}" data-pid="${proj.id}" data-days="${row.endDay-row.startDay}"
          x="${x1+Math.max(0,barW-8)}" y="${barY+3}" width="8" height="${barH-6}" rx="2"
          fill="${col}55" style="cursor:ew-resize;"/>
      </g>`;
      labelRows+=`<div style="height:${ROW_H}px;display:flex;align-items:center;padding-left:${indent+6}px;
          border-bottom:1px solid var(--border);gap:3px;cursor:pointer;
          background:${isSel?col+'14':stripe?'rgba(14,18,26,0.6)':'var(--bg3)'};
          border-left:${isSel?`2px solid ${col}`:'2px solid transparent'};"
        ondblclick="openGanttDetail('${row.ph.id}','subphase')"
        onmouseenter="this.querySelector('.gla').style.display='flex'"
        onmouseleave="this.querySelector('.gla').style.display='none'">
        <span style="font-size:10px;color:var(--faint);width:12px;flex-shrink:0;"
          onclick="event.stopPropagation();toggleGanttRow('${row.ph.id}')">${hasKids?toggle:''}</span>
        <div style="width:7px;height:7px;border-radius:1px;background:${col}88;flex-shrink:0;"></div>
        <span style="font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;
          text-overflow:ellipsis;flex:1;min-width:0;" title="${row.ph.name}">${row.ph.name}</span>
        <div class="gla" style="display:none;align-items:center;gap:1px;flex-shrink:0;">
          <button onclick="event.stopPropagation();addWP('${proj.id}','${row.ph.id}')"
            title="Add work package" style="${aBtnStyle}color:var(--muted)">📦</button>
          <button onclick="event.stopPropagation();delPhase('${proj.id}','${row.ph.id}')"
            title="Delete" style="${aBtnStyle}color:var(--red)">✕</button>
        </div>
      </div>`;

    } else if(row.type==='wp'){
      const isSel=ganttSelId===row.wp.id;
      const indent=row.depth*14;
      const wpcol=WP_COLS[row.wp.status]||'#4a556a';
      rowsSvg+=`<g transform="translate(0,${y})">
        <rect x="${x1}" y="${barY+7}" width="${barW}" height="${barH-14}" rx="2"
          fill="${wpcol}${isSel?'55':'38'}" stroke="${wpcol}99" stroke-width="${isSel?1.5:1}"/>
      </g>`;
      labelRows+=`<div style="height:${ROW_H}px;display:flex;align-items:center;padding-left:${indent+6}px;
          border-bottom:1px solid var(--border);gap:3px;cursor:pointer;
          background:${isSel?wpcol+'14':stripe?'rgba(14,18,26,0.6)':'var(--bg3)'};
          border-left:${isSel?`2px solid ${wpcol}`:'2px solid transparent'};"
        ondblclick="openGanttDetail('${row.wp.id}','wp')"
        onmouseenter="this.querySelector('.gla').style.display='flex'"
        onmouseleave="this.querySelector('.gla').style.display='none'">
        <div style="width:6px;height:6px;border-radius:50%;background:${wpcol};flex-shrink:0;"></div>
        <span style="font-size:11px;color:var(--faint);white-space:nowrap;overflow:hidden;
          text-overflow:ellipsis;flex:1;min-width:0;" title="${row.wp.name}">${row.wp.name}</span>
        <span style="font-size:9px;color:${wpcol};flex-shrink:0;">${WP_LABELS[row.wp.status]||''}</span>
        <div class="gla" style="display:none;align-items:center;gap:1px;flex-shrink:0;">
          <button onclick="event.stopPropagation();delWP('${proj.id}','${row.wp.id}')"
            title="Delete" style="${aBtnStyle}color:var(--red)">✕</button>
        </div>
      </div>`;
    }
  });

  // ── Assemble HTML ─────────────────────────────────────────────────────────────
  const endMs=startMs+totalDays*86400000;
  const fmtDate=ms=>new Date(ms).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const legendHtml=Object.entries(WP_COLS).map(([s,c])=>`
    <div style="display:flex;align-items:center;gap:5px;">
      <div style="width:9px;height:9px;border-radius:50%;background:${c};"></div>
      <span style="font-size:11px;color:var(--muted);">WP: ${WP_LABELS[s]}</span>
    </div>`).join('');
  const sideHtml=ganttSelId?`
    <div style="width:264px;flex-shrink:0;border:1px solid var(--border);border-radius:10px;
      background:var(--bg2);overflow-y:auto;max-height:${ganttHeight+HEADER_H+6}px;
      display:flex;flex-direction:column;">
      ${buildGanttDetailHtml(proj)}
    </div>`:'';

  document.getElementById('panelTimeline').innerHTML=`
    <div class="flex-between mb15">
      <div>
        <h2 style="margin:0 0 4px;">Timeline</h2>
        <div style="font-size:12px;color:var(--muted);">
          Project: <span style="color:${proj.color};font-weight:600;">${proj.name}</span>
          &nbsp;·&nbsp; ${fmtDate(startMs)} → ${fmtDate(endMs)} &nbsp;·&nbsp; ${Math.round(totalDays)} days
        </div>
      </div>
      <div class="flex-ac">
        <button class="btn btn-primary btn-sm" onclick="addPhase('${proj.id}')">+ Phase</button>
        <label style="font-size:11px;color:var(--muted);margin-left:6px;margin-right:4px;">Start</label>
        <input type="date" value="${startDateStr}" onchange="setGanttStartDate('${proj.id}',this.value)"
          style="font-size:12px;background:var(--bg4);border:1px solid var(--border);color:var(--text);
            border-radius:6px;padding:4px 8px;outline:none;margin-right:6px;">
        <button class="btn btn-sm" onclick="ganttZoom=Math.min(4,ganttZoom*1.5);renderTimeline()">+</button>
        <button class="btn btn-sm" onclick="ganttZoom=Math.max(0.1,ganttZoom/1.5);renderTimeline()">−</button>
        <button class="btn btn-sm" onclick="ganttZoom=1;renderTimeline()">⊙</button>
      </div>
    </div>

    <div style="display:flex;gap:12px;align-items:flex-start;">
      <div style="flex:1;min-width:0;">
        <div style="display:flex;border:1px solid var(--border);border-radius:10px 10px 0 0;overflow:hidden;background:var(--bg2);">
          <div style="width:${LABEL_W}px;flex-shrink:0;border-right:1px solid var(--border2);background:var(--bg2);">
            <div style="height:${HEADER_H}px;display:flex;align-items:flex-end;padding:0 8px 7px;
              border-bottom:1px solid var(--border2);background:var(--bg3);">
              <span style="font-size:10px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;">Phase / Task</span>
            </div>
            <div data-gantt-labels style="height:${ganttHeight}px;overflow:hidden;">${labelRows}</div>
          </div>
          <div style="flex:1;overflow-x:auto;overflow-y:hidden;height:${ganttHeight+HEADER_H}px;" id="ganttScroll">
            <svg width="${svgW}" height="${svgH+HEADER_H}" style="display:block;">
              <g>
                <rect width="${svgW}" height="${HEADER_H}" fill="var(--bg3)"/>
                <line x1="0" y1="${HEADER_H-1}" x2="${svgW}" y2="${HEADER_H-1}" stroke="var(--border2)" stroke-width="1"/>
                ${headerSvg}
              </g>
              <g transform="translate(0,${HEADER_H})">
                ${gridLines}${rowsSvg}${todayMarker}
              </g>
            </svg>
          </div>
        </div>
        <div onmousedown="startGanttResize(event)"
          style="height:6px;border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;
            background:var(--bg3);cursor:ns-resize;display:flex;align-items:center;justify-content:center;
            transition:background .12s;margin-bottom:10px;"
          onmouseenter="this.style.background='var(--bg4)'" onmouseleave="this.style.background='var(--bg3)'">
          <div style="width:40px;height:2px;border-radius:1px;background:var(--border2);pointer-events:none;"></div>
        </div>
      </div>
      ${sideHtml}
    </div>

    <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:center;">
      <span style="font-size:10px;color:var(--faint);font-weight:600;text-transform:uppercase;letter-spacing:.05em;">Legend</span>
      ${legendHtml}
      <div style="display:flex;align-items:center;gap:5px;">
        <div style="width:18px;height:2px;background:#e05050;opacity:0.75;"></div>
        <span style="font-size:11px;color:var(--muted);">Today</span>
      </div>
      <span style="font-size:11px;color:var(--faint);margin-left:auto;">
        Dbl-click to edit · Hover row for ⊕📦✕ · Drag bar edge to resize
      </span>
    </div>`;

  initGanttResizeEvents();
  initGanttBarResizeEvents();
}

// ── Phase split-pane drag ─────────────────────────────────────────────────────
function startPhaseSplit(e){
  e.preventDefault();
  const wrap=document.querySelector('[data-phase-pane="left"]')?.parentElement;
  if(!wrap)return;
  const rect=wrap.getBoundingClientRect();
  window.__phaseSplitDrag={startX:e.clientX,startSplit:phaseSplit,containerW:rect.width};
}
function initPhaseSplitEvents(){
  if(phaseSplitSetup)return;
  phaseSplitSetup=true;
  window.addEventListener('mousemove',e=>{
    if(!window.__phaseSplitDrag)return;
    const{startX,startSplit,containerW}=window.__phaseSplitDrag;
    phaseSplit=Math.max(0.15,Math.min(0.85,startSplit+(e.clientX-startX)/containerW));
    const lp=document.querySelector('[data-phase-pane="left"]');
    const rp=document.querySelector('[data-phase-pane="right"]');
    if(lp)lp.style.flex=`${phaseSplit} 1 0`;
    if(rp)rp.style.flex=`${1-phaseSplit} 1 0`;
  });
  window.addEventListener('mouseup',()=>{window.__phaseSplitDrag=null;});
}

// ── Gantt height drag ─────────────────────────────────────────────────────────
function startGanttResize(e){
  e.preventDefault();
  window.__ganttResizeDrag={startY:e.clientY,startH:ganttHeight};
}
function initGanttResizeEvents(){
  if(ganttResizeSetup)return;
  ganttResizeSetup=true;
  window.addEventListener('mousemove',e=>{
    if(!window.__ganttResizeDrag)return;
    const{startY,startH}=window.__ganttResizeDrag;
    ganttHeight=Math.max(180,Math.min(window.innerHeight-200,startH+(e.clientY-startY)));
    const gs=document.getElementById('ganttScroll');
    const ll=document.querySelector('#panelTimeline [data-gantt-labels]');
    if(gs)gs.style.height=ganttHeight+'px';
    if(ll)ll.style.height=ganttHeight+'px';
  });
  window.addEventListener('mouseup',()=>{window.__ganttResizeDrag=null;});
}

// ── Window resize → re-render active panel ────────────────────────────────────
window.addEventListener('resize',()=>{
  if(activeTab==='phases')renderPhases();
  else if(activeTab==='timeline')renderTimeline();
});

function toggleGanttRow(phid){
  if(ganttCollapsed.has(phid))ganttCollapsed.delete(phid);else ganttCollapsed.add(phid);
  renderTimeline();
}

async function setGanttStartDate(pid,date){
  await PATCH(`/api/projects/${pid}`,{startDate:date});
  await loadState();
  renderTimeline();
}

  });

        onchange="patchConnection('${proj.id}','${c.id}',{label:this.value})"

  document.getElementById('panelOrgchart').innerHTML=`

function orgUpdateTransform(){

// Window-level move/up for org chart — registered once so pan/drag survive leaving the SVG
function initOrgWindowEvents(){
  if(orgEventsSetup)return;
  orgEventsSetup=true;
  window.addEventListener('mousemove',e=>{
    const svg=document.getElementById('orgSvg');if(!svg)return;
    if(orgNodeDrag){
      const proj=S.projects?.find(p=>p.id===orgNodeDrag.pid);
      const t=proj?.teams.find(t=>t.id===orgNodeDrag.id);if(!t)return;
      const rect=svg.getBoundingClientRect();
      const vx=(e.clientX-rect.left-orgPan.x)/orgZoom;
      const vy=(e.clientY-rect.top-orgPan.y)/orgZoom;
      t.x=vx-orgNodeDrag.sx;
      t.y=vy-orgNodeDrag.sy;
      _redrawOrgChart(proj);
      clearTimeout(orgNodeDrag._t);
      const{pid:_pid,id:_id}=orgNodeDrag;const _x=t.x,_y=t.y;
      orgNodeDrag._t=setTimeout(()=>PATCH(`/api/projects/${_pid}/teams/${_id}`,{x:_x,y:_y}),400);
      return;
    }
    if(orgPanning){
      orgPan.x=e.clientX-orgPanning.sx;
      orgPan.y=e.clientY-orgPanning.sy;
      orgUpdateTransform();
    }
  });
  window.addEventListener('mouseup',()=>{
    if(!orgNodeDrag&&!orgPanning)return;
    orgNodeDrag=null;orgPanning=null;
    const svg=document.getElementById('orgSvg');
    if(svg)svg.style.cursor=ap()?.orgMode==='connecting'?'crosshair':'grab';
  });
}

function initProjOrgEvents(pid){
  const svg=document.getElementById('orgSvg');if(!svg)return;

  // Node drag — account for zoom/pan
  svg.querySelectorAll('.proj-node').forEach(el=>{
    el.addEventListener('mousedown',e=>{
      const proj=ap();if(proj?.orgMode==='connecting')return;
      const id=el.dataset.id,t=proj?.teams.find(t=>t.id===id);if(!t)return;
      const rect=svg.getBoundingClientRect();
      const vx=(e.clientX-rect.left-orgPan.x)/orgZoom;
      const vy=(e.clientY-rect.top-orgPan.y)/orgZoom;
      orgNodeDrag={pid,id,sx:vx-(t.x??30),sy:vy-(t.y??40)};
      e.preventDefault();e.stopPropagation();
    });
  });

  // Background mousedown → pan
  svg.addEventListener('mousedown',e=>{
    if(e.target.closest('.proj-node')) return;
    orgPanning={sx:e.clientX-orgPan.x,sy:e.clientY-orgPan.y};
    svg.style.cursor='grabbing';
  });

  // Scroll to zoom
  svg.addEventListener('wheel',e=>{
    e.preventDefault();
    const delta=e.deltaY>0?-0.1:0.1;
    orgZoom=Math.max(.2,Math.min(2.5,orgZoom+delta));
    orgUpdateTransform();
  },{passive:false});

  initOrgWindowEvents();
}

// Lightweight redraw during node drag — no full DOM rebuild
function _redrawOrgChart(proj){
  const{teams,connections}=proj;
  // Reposition nodes
  document.querySelectorAll('.proj-node').forEach(el=>{
    const t=teams.find(t=>t.id===el.dataset.id);if(!t)return;
    el.setAttribute('transform',`translate(${t.x??30},${t.y??40})`);
  });
  // Redraw edges
  const edgesG=document.querySelector('#orgViewport g');if(!edgesG)return;
  const tCol2=t=>({integration:'#4a9eff',dependency:'#f0a030',handoff:'#1fb885',reporting:'#9b7ee8'})[t]||'#4a9eff';
  edgesG.innerHTML=connections.map(c=>{
    const ft=teams.find(t=>t.id===c.from),tt=teams.find(t=>t.id===c.to);if(!ft||!tt)return'';
    const col=tCol2(c.type);
    const x1=(ft.x??30)+NODE_W/2,y1=(ft.y??40)+NODE_H/2;
    const x2=(tt.x??30)+NODE_W/2,y2=(tt.y??40)+NODE_H/2;
    const mx=(x1+x2)/2,my=(y1+y2)/2,dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy)||1;
    const nx=-dy/len*20,ny=dx/len*20;
    return`<path d="M${x1},${y1} Q${mx+nx},${my+ny} ${x2},${y2}" stroke="${col}" stroke-width="2" fill="none" marker-end="url(#arr-${c.type})" stroke-dasharray="${c.type==='dependency'?'6,3':'none'}"/>
      <rect x="${mx+nx-36}" y="${my+ny-11}" width="72" height="20" rx="4" fill="#161b27" stroke="${col}" stroke-width="1" opacity=".92"/>
      <text x="${mx+nx}" y="${my+ny+4}" text-anchor="middle" fill="${col}" font-size="10" font-family="Segoe UI,system-ui" font-weight="600">${c.label||c.type}</text>`;
  }).join('');
}

// ════════════════════════════════════════════════════════════════════════════
async function renderAnalysis(){
  const proj=ap();if(!proj)return;
  const{teams,connections,phases}=proj;
  const allM=teams.flatMap(t=>t.members);
  const tw=phases.reduce((a,p)=>a+p.weeks,0);
  document.getElementById('panelAnalysis').innerHTML=`
    <div class="flex-between mb15">
      <div><h2 style="margin:0 0 4px;">${proj.name} — Analysis</h2>
        <div style="font-size:12px;color:var(--muted);">${teams.length} teams · ${allM.length} members · ${phases.length} phases · ${tw}w</div></div>
      <button class="btn btn-primary" onclick="renderAnalysis()">↻ Re-run</button>
    </div>
    <div id="analysisContent"><div style="padding:3rem;text-align:center;color:var(--muted);"><span class="spinner" style="display:inline-block;margin-right:8px;"></span>Running Monte Carlo simulation…</div></div>`;

  const data = await POST('/api/simulate', {projectId: proj.id, runs: 2000});
  const res  = data.combined;
  const tRes = data.teams;

  const maxReq={};phases.forEach(ph=>Object.entries(ph.required||{}).forEach(([sk,lv])=>{if(!maxReq[sk]||maxReq[sk]<lv)maxReq[sk]=lv;}));
  const gaps=Object.entries(maxReq).map(([sk,req])=>{const av=res.team_exp?.[sk]||0;return{sk,req,av,cov:Math.min(1,av/req)};}).sort((a,b)=>a.cov-b.cov);
  const crit=gaps.filter(g=>g.cov<.85).length;
  const oPct=Math.round((res.overall_prob||0)*100);
  const sc=spCol(res.overall_prob||0);

  const tCards=teams.map(t=>{
    const tr=tRes[t.id]||{};const pct=Math.round((tr.overall_prob||0)*100);const hcol=spCol(tr.overall_prob||0);
    const wk=Object.entries(maxReq).map(([sk,req])=>({sk,req,av:tr.team_exp?.[sk]||0,cov:Math.min(1,(tr.team_exp?.[sk]||0)/req)})).sort((a,b)=>a.cov-b.cov).slice(0,3);
    return`<div class="card-sm" style="border-left:3px solid ${t.color};">
      <div class="flex-between" style="margin-bottom:8px;">
        <div class="flex-ac"><div style="width:8px;height:8px;border-radius:50%;background:${t.color};"></div><span style="font-weight:700;font-size:13px;">${t.name}</span><span style="font-size:11px;color:var(--faint);">${t.members.length}m</span></div>
        <span style="font-size:18px;font-weight:700;font-family:var(--mono);color:${hcol};">${pct}%</span>
      </div>
      <div style="height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-bottom:8px;"><div style="height:100%;width:${pct}%;background:${hcol};border-radius:2px;"></div></div>
      <div style="font-size:11px;color:var(--faint);margin-bottom:3px;">Weakest skills:</div>
      ${wk.map(g=>`<div class="flex-ac" style="margin-top:4px;"><span style="font-size:11px;color:var(--muted);width:100px;flex-shrink:0;">${g.sk}</span>
        <div class="gap-bar-wrap"><div class="gap-fill" style="width:${Math.round(g.cov*100)}%;background:${g.cov>=1?'#1fb885':g.cov>=.7?'#f0a030':'#e05050'};"></div></div>
        <span style="font-size:10px;color:var(--faint);min-width:28px;">${Math.round(g.cov*100)}%</span></div>`).join('')}
    </div>`;}).join('');

  const gapRows=gaps.map(g=>{
    const bc=g.cov>=1?'#1fb885':g.cov>=.85?'#5dc890':g.cov>=.7?'#f0a030':'#e05050';
    const rb=g.cov>=.85?'b-ok':g.cov>=.7?'b-med':'b-high';
    const risk=g.cov>=1?'None':g.cov>=.85?'Low':g.cov>=.7?'Medium':'High';
    const ph=phases.filter(p=>p.required?.[g.sk]).map(p=>p.name).join(', ');
    const gap=Math.max(0,g.req-g.av);
    const contrib=teams.map(t=>{const tr2=tRes[t.id]||{};return(tr2.team_exp?.[g.sk]||0)>=1?`<span style="color:${t.color};font-size:10px;">●</span>`:null;}).filter(Boolean).join(' ');
    return`<tr><td><div style="font-weight:600;">${g.sk}</div><div style="font-size:11px;color:var(--faint);">${ph}</div></td>
      <td class="c" style="font-family:var(--mono);font-weight:700;">${g.req.toFixed(1)}</td>
      <td class="c" style="font-family:var(--mono);font-weight:700;color:${bc};">${g.av.toFixed(1)}</td>
      <td class="c" style="font-family:var(--mono);color:${gap>0?'#e05050':'#1fb885'};">${gap>0?'+'+gap.toFixed(1):'✓'}</td>
      <td><div class="flex-ac"><div class="gap-bar-wrap"><div class="gap-fill" style="width:${Math.round(Math.min(100,g.cov*100))}%;background:${bc};"></div></div><span style="font-size:11px;color:var(--muted);min-width:30px;">${Math.round(g.cov*100)}%</span></div></td>
      <td class="c"><span class="badge ${rb}">${risk}</span></td>
      <td class="c">${contrib||'—'}</td></tr>`;}).join('');

  const connRisks=connections.map(c=>{
    const ft=teams.find(t=>t.id===c.from),tt=teams.find(t=>t.id===c.to);if(!ft||!tt)return'';
    const fr=tRes[c.from]||{},tr2=tRes[c.to]||{};
    const risk=Math.min(fr.overall_prob||0,tr2.overall_prob||0);
    const overlap=ALL_SKILLS.filter(sk=>(fr.team_exp?.[sk]||0)>=7&&(tr2.team_exp?.[sk]||0)>=7);

        <div>${phG.map(g=>`<span class="badge ${g.ok?'b-ok':'b-high'}" style="margin:2px;">${g.sk} ${g.ok?'✓':g.av.toFixed(1)+'/'+g.req.toFixed(0)}</span>`).join('')}</div>
      </div></div>`;}).join('');

  document.getElementById('analysisContent').innerHTML=`

      <div class="metric"><label>Interfaces</label><div class="val">${connections.length}</div><div class="sub">team connections</div></div>
    </div>

function openImportPicker(){ importChecked=new Set(); renderImportPicker(); document.getElementById('importOverlay').style.display='flex'; }

function renderImportPicker(){
  const proj=ap();if(!proj)return;
  const usedOrgIds=new Set(proj.teams.flatMap(t=>t.members.filter(m=>m.orgId).map(m=>m.orgId)));
  function pickRow(node,depth){
    const col=ORG_TYPE_COLOR[node.type]||'#888';
    const persons=flatPersonsUnder(node);
    const allUsed=persons.length>0&&persons.every(p=>usedOrgIds.has(p.id));
    const checked=importChecked.has(node.id);
    const isP=node.type==='person';
    const sub=isP?node.role:persons.length+' people';
    const indent=depth>0?`padding-left:${depth*18}px`:'';
    return`<div class="pick-row" style="${indent}">
      <input type="checkbox" ${checked?'checked':''} ${allUsed&&!checked?'disabled title="All assigned"':''}
        onchange="togglePick('${node.id}',this.checked);renderImportPicker()">
      <div style="width:16px;height:16px;border-radius:3px;background:${col}18;color:${col};display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;">${ORG_TYPE_ICON[node.type]||'●'}</div>

    </div>${(!isP&&node.children?.length)?node.children.map(c=>pickRow(c,depth+1)).join(''):''}`;
  }
  const body=(S.globalOrg?.children||[]).map(n=>pickRow(n,0)).join('');
  const selCount=[...importChecked].reduce((a,id)=>{const n=findNode(S.globalOrg,id);return a+flatPersonsUnder(n||{}).length;},0);
  document.getElementById('importOverlay').innerHTML=`
    <div class="import-panel">
      <div class="import-header">
        <div><div style="font-size:15px;font-weight:700;">Import from Organization</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px;">Adding to: <span style="color:${proj.color};font-weight:600;">${proj.teams.find(t=>t.id===proj.selTeamId)?.name||'team'}</span></div></div>
        <button class="btn btn-danger btn-sm" onclick="closeImportPicker()">✕</button>
      </div>
      <div class="import-body">${body}</div>
      <div class="import-footer">
        <div style="font-size:13px;color:var(--muted);">${selCount} people selected</div>
        <div class="flex-ac">
          <select id="importTargetTeam">${proj.teams.map(t=>`<option value="${t.id}" ${t.id===proj.selTeamId?'selected':''}>${t.name}</option>`).join('')}</select>
          <button class="btn" onclick="closeImportPicker()">Cancel</button>
          <button class="btn btn-primary" onclick="confirmImport()">Import ${selCount>0?selCount+' people':'selected'}</button>
        </div>
      </div>
    </div>`;
}

function togglePick(id,checked){
  const node=findNode(S.globalOrg,id);if(!node)return;
  const persons=flatPersonsUnder(node);
  if(node.type==='person'){checked?importChecked.add(id):importChecked.delete(id);}
  else{persons.forEach(p=>{checked?importChecked.add(p.id):importChecked.delete(p.id);});checked?importChecked.add(id):importChecked.delete(id);}
}

// TIMELINE OVERRIDES (floating inspector, dependencies, infinite calendar)
// ════════════════════════════════════════════════════════════════════════════
let ganttViewStartDay = -14;
let ganttViewDays = 140;
let ganttInspectorPos = {x: 260, y: 140};
let ganttInspectorDrag = null;
let ganttInspectorSetup = false;

function phaseDays(ph){
  return parseFloat(ph.value ?? ph.weeks ?? 2) * ((ph.unit && TO_DAYS[ph.unit]) || 7);
}
function wpDays(wp){
  return parseFloat(wp.value ?? 1) * ((wp.unit && TO_DAYS[wp.unit]) || 7);
}
function clamp(n,min,max){ return Math.max(min, Math.min(max, n)); }
function isoWeekParts(date){
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
  const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return {year:d.getUTCFullYear(), week:weekNo};
}
function fmtDateLabel(ms){
  return new Date(ms).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}
function dateInputFromProjectDay(startMs, day){
  return new Date(startMs + Math.round(day)*86400000).toISOString().slice(0,10);
}
function projectDayFromDate(startMs, val){
  if(!val) return null;
  return Math.round((new Date(val).getTime() - startMs) / 86400000);
}
function taskLabel(task){ return task.type==='wp' ? (task.wp?.name||'Work Package') : (task.ph?.name||'Phase'); }
function taskDuration(task){ return task.type==='wp' ? wpDays(task.wp||{}) : phaseDays(task.ph||{}); }
function taskStartOverride(task){ return task.type==='wp' ? task.wp?.startDateOverride : task.ph?.startDateOverride; }
function taskEndOverride(task){ return task.type==='wp' ? task.wp?.endDateOverride : task.ph?.endDateOverride; }

function buildTaskRegistry(proj){
  const tasks=[]; const map={};
  function pushTask(task){ tasks.push(task); map[task.id]=task; }
  function walkPhase(ph, depth, parentId, rootId){
    const task={id:ph.id, type: depth===0?'phase':'subphase', ph, depth, parentId, rootId:rootId||ph.id, childrenIds:[], wpIds:[]};
    pushTask(task);
    (ph.children||[]).forEach(ch=>{ task.childrenIds.push(ch.id); walkPhase(ch, depth+1, ph.id, rootId||ph.id); });
    (ph.workPackages||[]).forEach(wp=>{
      task.wpIds.push(wp.id);
      pushTask({id:wp.id, type:'wp', wp, ph, depth:depth+1, parentId:ph.id, rootId:rootId||ph.id, childrenIds:[], wpIds:[]});
    });
  }
  (proj.phases||[]).forEach(ph=>walkPhase(ph,0,null,ph.id));
  return {tasks,map};
}

function getTaskPredecessors(proj, taskId){
  const edges=(proj.taskEdges||[]).filter(e=>e.to===taskId).map(e=>e.from);
  const phaseEdges=(proj.phaseEdges||[]).filter(e=>e.to===taskId).map(e=>e.from);
  return [...new Set([...edges, ...phaseEdges])];
}

function setTaskPredecessors(pid, taskId, predIds){
  const proj=ap(); if(!proj) return;
  const keep=(proj.taskEdges||[]).filter(e=>e.to!==taskId);
  const add=(predIds||[]).filter(Boolean).filter(id=>id!==taskId).map(id=>({id:'te_'+Math.random().toString(36).slice(2,10), from:id, to:taskId}));
  patchProject(pid,{taskEdges:[...keep,...add]});
}

function buildGanttRows(proj){
  const {tasks,map}=buildTaskRegistry(proj);
  const topIds=(proj.phases||[]).map(ph=>ph.id);
  const preds={};
  tasks.forEach(t=>preds[t.id]=new Set(getTaskPredecessors(proj, t.id)));

  // default sequential ordering within same list
  function addSequential(list){
    for(let i=1;i<list.length;i++) preds[list[i]].add(list[i-1]);
  }
  addSequential(topIds);
  (proj.phases||[]).forEach(function walk(ph){
    addSequential((ph.children||[]).map(c=>c.id));
    addSequential((ph.workPackages||[]).map(w=>w.id));
    (ph.children||[]).forEach(walk);
  });

  const startDateStr=proj.startDate||new Date().toISOString().slice(0,10);
  const startMs=new Date(startDateStr).getTime();
  const byId={};
  const ordered=tasks.map(t=>t.id);
  for(let pass=0; pass<ordered.length+3; pass++){
    let changed=false;
    ordered.forEach(id=>{
      const t=map[id]; if(!t) return;
      const predEnd=[...preds[id]].map(pid=>byId[pid]?.endDay).filter(v=>v!=null);
      const minStart=predEnd.length?Math.max(...predEnd):0;
      const startOverride=projectDayFromDate(startMs, taskStartOverride(t));
      let startDay=Math.max(minStart, startOverride!=null?startOverride:0);
      const dur=taskDuration(t);
      const endOverride=projectDayFromDate(startMs, taskEndOverride(t));
      let endDay=endOverride!=null?Math.max(startDay, endOverride):startDay+dur;
      const prev=byId[id];
      if(!prev || prev.startDay!==startDay || prev.endDay!==endDay){
        byId[id]={startDay,endDay}; changed=true;
      }
    });
    if(!changed) break;
  }

  const rows=[];
  function walkRender(ph, depth){
    const task=map[ph.id]; if(!task) return;
    const rootIdx=Math.max(0, (proj.phases||[]).findIndex(p=>p.id===task.rootId));
    const col=PCOLS[rootIdx%PCOLS.length];
    rows.push({id:ph.id, ph, depth, type:depth===0?'phase':'subphase', col, ...byId[ph.id]});
    if(!ganttCollapsed.has(ph.id)){
      (ph.children||[]).forEach(ch=>walkRender(ch, depth+1));
      (ph.workPackages||[]).forEach(wp=>{
        rows.push({id:wp.id, ph, wp, depth:depth+1, type:'wp', col, ...byId[wp.id]});
      });
    }
  }
  (proj.phases||[]).forEach(ph=>walkRender(ph,0));
  const totalDays=Math.max(1, ...Object.values(byId).map(v=>v.endDay), ganttViewStartDay + ganttViewDays);
  return {rows,totalDays,startMs,map};
}

function buildTaskDependencyOptions(proj, currentId){
  const {tasks}=buildTaskRegistry(proj);
  return tasks.filter(t=>t.id!==currentId).map(t=>`<option value="${t.id}">${t.type==='wp'?'📦':'▦'} ${taskLabel(t)}</option>`).join('');
}

function buildGanttDetailHtml(proj){
  if(!ganttSelId) return '';
  let wp=null, ph=null;
  (function scan(phases){ for(const p of phases){ if(p.id===ganttSelId) ph=p; (p.workPackages||[]).forEach(w=>{ if(w.id===ganttSelId) wp=w; }); scan(p.children||[]); } })(proj.phases||[]);
  return wp ? buildWpInspector(proj, wp) : (ph ? buildPhaseInspector(proj, ph) : '<div style="padding:1rem;color:var(--faint);">Not found</div>');
}

function openGanttDetail(id,type,evt){
  ganttSelId = ganttSelId===id ? null : id;
  ganttSelType = type;
  if(evt && ganttSelId){
    ganttInspectorPos = {x: clamp(evt.clientX + 16, 20, window.innerWidth - 420), y: clamp(evt.clientY + 12, 20, window.innerHeight - 420)};
  }
  renderTimeline();
}

function startGanttInspectorDrag(e){
  const box=document.getElementById('ganttInspector'); if(!box) return;
  ganttInspectorDrag = {dx:e.clientX - box.offsetLeft, dy:e.clientY - box.offsetTop};

}

function initGanttBarResizeEvents(){
  if(ganttBarResizeSetup) return;
  ganttBarResizeSetup = true;
  document.addEventListener('mousedown',e=>{
    const h=e.target.closest?.('.g-resize'); if(!h) return;
    e.preventDefault(); e.stopPropagation();
    const DAY_W=Math.max(3,Math.round(14*ganttZoom));
    ganttBarResizeDrag={id:h.dataset.id,type:h.dataset.type,pid:h.dataset.pid,startDays:parseFloat(h.dataset.days),startX:e.clientX,DAY_W,currentDays:parseFloat(h.dataset.days)};
  });
  window.addEventListener('mousemove',e=>{
    if(!ganttBarResizeDrag) return;
    const {startX,startDays,DAY_W} = ganttBarResizeDrag;
    ganttBarResizeDrag.currentDays = Math.max(1, startDays + (e.clientX-startX)/DAY_W);
    const g=document.querySelector(`[data-gbar="${ganttBarResizeDrag.id}"]`); if(!g) return;
    const bar=g.querySelector('rect.g-main'); if(!bar) return;
    const newW=Math.max(4,Math.round(ganttBarResizeDrag.currentDays*DAY_W));
    bar.setAttribute('width',newW);
    const handle=g.querySelector('.g-resize'); if(handle) handle.setAttribute('x',parseFloat(bar.getAttribute('x')) + Math.max(0,newW-7));
  });
  window.addEventListener('mouseup',async()=>{
    if(!ganttBarResizeDrag) return;
    const {id,type,pid,currentDays}=ganttBarResizeDrag; ganttBarResizeDrag=null;
    const {value,unit}=daysToValueUnit(currentDays);
    if(type==='wp') await PATCH(`/api/projects/${pid}/work-packages/${id}`,{value,unit});
    else await PATCH(`/api/projects/${pid}/phases/${id}`,{value,unit});
    await loadState(); renderTimeline();
  });
}

function startGanttResize(e){ e.preventDefault(); window.__ganttResizeDrag={startY:e.clientY,startH:ganttHeight}; }
function initGanttResizeEvents(){
  if(ganttResizeSetup) return;
  ganttResizeSetup=true;
  window.addEventListener('mousemove',e=>{
    if(!window.__ganttResizeDrag) return;
    const {startY,startH}=window.__ganttResizeDrag;

    if(gs) gs.style.height=ganttHeight+'px';

}

function renderTimeline(){
  const proj=ap(); if(!proj) return;
  proj.taskEdges = proj.taskEdges || [];
  const {rows,totalDays,startMs} = buildGanttRows(proj);
  const ROW_H=38, LABEL_W=290, DAY_W=Math.max(3,Math.round(14*ganttZoom));
  const HEADER_H=56;
  const visibleStart=ganttViewStartDay;
  const visibleEnd=Math.max(visibleStart + ganttViewDays, totalDays + 42);
  const svgW=Math.max(900, (visibleEnd-visibleStart) * DAY_W + 40);
  const svgH=rows.length*ROW_H;
  const dx=d=>Math.round((d-visibleStart)*DAY_W);
  const projectStartLabel=fmtDateLabel(startMs);

  let headerSvg='', gridLines='';
  const firstWeek=Math.floor(visibleStart/7)*7;
  for(let d=firstWeek; d<=visibleEnd+7; d+=7){
    const x=dx(d);
    const date=new Date(startMs + d*86400000);
    const iso=isoWeekParts(date);
    headerSvg += `<line x1="${x}" y1="0" x2="${x}" y2="${HEADER_H}" stroke="var(--border)" stroke-width="0.8"/>
      <text x="${x+3}" y="15" fill="var(--muted)" font-size="10" font-weight="600" font-family="var(--font)">${iso.year} · W${String(iso.week).padStart(2,'0')}</text>
      <text x="${x+3}" y="31" fill="var(--faint)" font-size="9" font-family="var(--mono)">Project W${Math.floor(d/7)+1}</text>
      <text x="${x+3}" y="46" fill="var(--faint)" font-size="9" font-family="var(--font)">${date.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})}</text>`;
    gridLines += `<line x1="${x}" y1="0" x2="${x}" y2="${svgH}" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="2,5" opacity="0.55"/>`;
  }

  const todayDay=Math.round((Date.now()-startMs)/86400000);
  const todayMarker=(todayDay>=visibleStart&&todayDay<=visibleEnd)?`<line x1="${dx(todayDay)}" y1="0" x2="${dx(todayDay)}" y2="${svgH}" stroke="#e05050" stroke-width="1.5" opacity="0.8"/><polygon points="${dx(todayDay)-4},0 ${dx(todayDay)+4},0 ${dx(todayDay)},6" fill="#e05050" opacity="0.8"/>`:'';

  const aBtnStyle=`background:none;border:none;cursor:pointer;padding:1px 4px;font-size:11px;line-height:1;border-radius:3px;`;
  let labelRows='', rowsSvg='';
  rows.forEach((row,i)=>{
    const y=i*ROW_H, midY=ROW_H/2, barY=6, barH=ROW_H-12;
    const start=row.startDay ?? 0, end=row.endDay ?? start+1;
    const x1=dx(start), barW=Math.max(4, dx(end)-x1);
    const stripe=i%2===1;
    const mainColor=row.type==='wp' ? (WP_COLS[row.wp.status]||'#4a556a') : row.col;
    const isSel=ganttSelId===row.id;
    if(stripe) rowsSvg += `<rect x="0" y="${y}" width="${svgW}" height="${ROW_H}" fill="rgba(255,255,255,0.018)"/>`;
    rowsSvg += `<g transform="translate(0,${y})" data-gbar="${row.id}">
      <rect class="g-main" x="${x1}" y="${row.type==='wp'?barY+7:barY}" width="${barW}" height="${row.type==='wp'?barH-10:barH}" rx="${row.type==='wp'?2:4}" fill="${mainColor}${isSel?'50':row.type==='wp'?'38':'28'}" stroke="${mainColor}" stroke-width="${isSel?2:1.2}"/>
      ${barW>52?`<text x="${x1+6}" y="${midY+4}" fill="${mainColor}" font-size="${row.type==='wp'?10:11}" font-weight="600" font-family="var(--font)">${taskLabel(row).length>Math.max(8,Math.floor(barW/7))?taskLabel(row).slice(0,Math.max(8,Math.floor(barW/7))-1)+'…':taskLabel(row)}</text>`:''}
      <rect class="g-resize" data-id="${row.id}" data-type="${row.type}" data-pid="${proj.id}" data-days="${end-start}" x="${x1+Math.max(0,barW-8)}" y="${row.type==='wp'?barY+7:barY}" width="8" height="${row.type==='wp'?barH-10:barH}" rx="2" fill="${mainColor}66" style="cursor:ew-resize;"/>
    </g>`;

    const hasKids=(row.type!=='wp') && (((row.ph.children||[]).length>0) || ((row.ph.workPackages||[]).length>0));
    const toggle=hasKids ? (ganttCollapsed.has(row.ph.id)?'▸':'▾') : '';
    const indent=row.depth*16;
    const startTxt=fmtDateLabel(startMs + start*86400000);
    const endTxt=fmtDateLabel(startMs + end*86400000);
    const moveHtml=row.type==='wp'
      ? `<button onclick="event.stopPropagation();moveWP('${proj.id}','${row.wp.id}',-1)" title="Move up" style="${aBtnStyle}color:var(--muted)">▲</button><button onclick="event.stopPropagation();moveWP('${proj.id}','${row.wp.id}',1)" title="Move down" style="${aBtnStyle}color:var(--muted)">▼</button>`
      : `<button onclick="event.stopPropagation();movePhase('${proj.id}','${row.ph.id}',-1)" title="Move up" style="${aBtnStyle}color:var(--muted)">▲</button><button onclick="event.stopPropagation();movePhase('${proj.id}','${row.ph.id}',1)" title="Move down" style="${aBtnStyle}color:var(--muted)">▼</button>`;
    labelRows += `<div style="height:${ROW_H}px;display:flex;align-items:center;padding-left:${indent+6}px;border-bottom:1px solid var(--border);gap:6px;cursor:pointer;background:${isSel?mainColor+'14':stripe?'rgba(255,255,255,0.018)':'transparent'};border-left:${isSel?`2px solid ${mainColor}`:'2px solid transparent'};" ondblclick="openGanttDetail('${row.id}','${row.type}', event)" onmouseenter="this.querySelector('.gla').style.display='flex'" onmouseleave="this.querySelector('.gla').style.display='none'">
      <span style="font-size:10px;color:var(--muted);width:12px;flex-shrink:0;" onclick="event.stopPropagation();${row.type!=='wp'?`toggleGanttRow('${row.ph.id}')`:''}">${toggle}</span>
      <div style="width:${row.type==='wp'?6:8}px;height:${row.type==='wp'?6:8}px;border-radius:${row.type==='wp'?'50%':'2px'};background:${mainColor};flex-shrink:0;"></div>
      <div style="min-width:0;flex:1;">
        <div style="font-size:${row.type==='phase'?12:11}px;color:${row.type==='phase'?'var(--text)':'var(--muted)'};font-weight:${row.type==='phase'?700:500};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${taskLabel(row)}</div>
        <div style="font-size:9px;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${startTxt} → ${endTxt}</div>
      </div>
      <div class="gla" style="display:none;align-items:center;gap:1px;flex-shrink:0;">${moveHtml}${row.type!=='wp'?`<button onclick="event.stopPropagation();addSubphase('${proj.id}','${row.ph.id}')" title="Add subphase" style="${aBtnStyle}color:var(--teal)">⊕</button><button onclick="event.stopPropagation();addWP('${proj.id}','${row.ph.id}')" title="Add work package" style="${aBtnStyle}color:var(--muted)">📦</button><button onclick="event.stopPropagation();delPhase('${proj.id}','${row.ph.id}')" title="Delete" style="${aBtnStyle}color:var(--red)">✕</button>`:`<button onclick="event.stopPropagation();delWP('${proj.id}','${row.wp.id}')" title="Delete" style="${aBtnStyle}color:var(--red)">✕</button>`}</div>
    </div>`;
  });

  const endMs=startMs+totalDays*86400000;
  const inspectorHtml=ganttSelId ? `<div id="ganttInspector" style="position:fixed;left:${ganttInspectorPos.x}px;top:${ganttInspectorPos.y}px;width:400px;max-height:78vh;overflow:auto;z-index:90;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;box-shadow:0 18px 48px rgba(0,0,0,.45);">
      <div onmousedown="startGanttInspectorDrag(event)" style="position:sticky;top:0;z-index:2;display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg3);border-bottom:1px solid var(--border);cursor:move;">
        <span style="font-size:12px;font-weight:700;color:var(--text);">Timeline Inspector</span>
        <button onclick="ganttSelId=null;renderTimeline()" style="background:none;border:none;color:var(--faint);cursor:pointer;font-size:16px;line-height:1;">✕</button>
      </div>
      <div style="padding:12px;">${buildGanttDetailHtml(proj)}</div>
    </div>` : '';

  document.getElementById('panelTimeline').innerHTML=`
    <div class="flex-between mb15">
      <div>
        <h2 style="margin:0 0 4px;">Timeline</h2>
        <div style="font-size:12px;color:var(--muted);">Project: <span style="color:${proj.color};font-weight:600;">${proj.name}</span> · ${projectStartLabel} → ${fmtDateLabel(endMs)} · dependency-aware schedule</div>
      </div>
      <div class="flex-ac">
        <button class="btn btn-primary btn-sm" onclick="addPhase('${proj.id}')">+ Phase</button>
        <label style="font-size:11px;color:var(--muted);margin-left:6px;margin-right:4px;">Start</label>
        <input type="date" value="${proj.startDate||new Date().toISOString().slice(0,10)}" onchange="setGanttStartDate('${proj.id}',this.value)" style="font-size:12px;margin-right:6px;">
        <button class="btn btn-sm" onclick="ganttViewStartDay-=28;renderTimeline()">← 4w</button>
        <button class="btn btn-sm" onclick="ganttViewStartDay+=28;renderTimeline()">4w →</button>
        <button class="btn btn-sm" onclick="ganttViewStartDay=-14;renderTimeline()">Today</button>
        <button class="btn btn-sm" onclick="ganttZoom=Math.min(4,ganttZoom*1.25);renderTimeline()">+</button>
        <button class="btn btn-sm" onclick="ganttZoom=Math.max(0.2,ganttZoom/1.25);renderTimeline()">−</button>
      </div>
    </div>
    <div style="display:flex;border:1px solid var(--border);border-radius:10px 10px 0 0;overflow:hidden;background:var(--bg2);">
      <div style="width:${LABEL_W}px;flex-shrink:0;border-right:1px solid var(--border2);background:var(--bg2);">
        <div style="height:${HEADER_H}px;display:flex;align-items:flex-end;padding:0 8px 7px;border-bottom:1px solid var(--border2);background:var(--bg3);">
          <span style="font-size:10px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;">Phase / Task · Start / End</span>
        </div>
        <div data-gantt-labels style="height:${ganttHeight}px;overflow:hidden;">${labelRows}</div>
      </div>
      <div style="flex:1;overflow:auto;height:${ganttHeight+HEADER_H}px;" id="ganttScroll">
        <svg width="${svgW}" height="${svgH+HEADER_H}" style="display:block;">
          <g><rect width="${svgW}" height="${HEADER_H}" fill="var(--bg3)"/><line x1="0" y1="${HEADER_H-1}" x2="${svgW}" y2="${HEADER_H-1}" stroke="var(--border2)" stroke-width="1"/>${headerSvg}</g>
          <g transform="translate(0,${HEADER_H})">${gridLines}${rowsSvg}${todayMarker}</g>
        </svg>
      </div>
    </div>
    <div onmousedown="startGanttResize(event)" style="height:6px;border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;background:var(--bg3);cursor:ns-resize;display:flex;align-items:center;justify-content:center;transition:background .12s;margin-bottom:10px;" onmouseenter="this.style.background='var(--bg4)'" onmouseleave="this.style.background='var(--bg3)'"><div style="width:40px;height:2px;border-radius:1px;background:var(--border2);pointer-events:none;"></div></div>
    <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:center;">
      <span style="font-size:10px;color:var(--faint);font-weight:600;text-transform:uppercase;letter-spacing:.05em;">Legend</span>
      <div style="display:flex;align-items:center;gap:5px;"><div style="width:10px;height:10px;border-radius:2px;background:#4a9eff;"></div><span style="font-size:11px;color:var(--muted);">Phase/Subphase</span></div>
      ${Object.entries(WP_COLS).map(([s,c])=>`<div style="display:flex;align-items:center;gap:5px;"><div style="width:9px;height:9px;border-radius:50%;background:${c};"></div><span style="font-size:11px;color:var(--muted);">WP: ${WP_LABELS[s]}</span></div>`).join('')}
      <div style="display:flex;align-items:center;gap:5px;"><div style="width:18px;height:2px;background:#e05050;opacity:0.75;"></div><span style="font-size:11px;color:var(--muted);">Today</span></div>
      <span style="font-size:11px;color:var(--faint);margin-left:auto;">Double-click a row for a draggable floating editor. Dependencies apply start-after-finish scheduling.</span>
    </div>
    ${inspectorHtml}`;

  initGanttResizeEvents();
  initGanttBarResizeEvents();
  initGanttInspectorEvents();
}

const moveWP = (pid,wpid,dir)=>actPhases(()=>POST(`/api/projects/${pid}/work-packages/${wpid}/move`,{direction:dir}));

// ── Export / Import ───────────────────────────────────────────────────────────
function exportProjects(){
  const blob=new Blob([JSON.stringify({
    version:1,
    exportedAt:new Date().toISOString(),
    globalOrg:S.globalOrg,
    projects:S.projects
  },null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`teamiq-export-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function triggerImport(){
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='.json';
  inp.onchange=async e=>{
    const file=e.target.files[0]; if(!file)return;
    try{
      const text=await file.text();
      const data=JSON.parse(text);
      if(!data.projects||!Array.isArray(data.projects)){
        alert('Invalid TeamIQ export file.'); return;
      }
      if(!confirm(`Import ${data.projects.length} project(s)?${data.globalOrg?' This will also replace your organization hierarchy.':''}`))return;
      const r=await POST('/api/import',data);
      if(r.ok){ await loadState(); rerender(); alert(`Imported ${r.imported} project(s) successfully.`); }
      else alert('Import failed: '+(r.error||'unknown error'));
    }catch(err){ alert('Could not parse file: '+err.message); }
  };
  inp.click();
}


// ── Boot ───────────────────────────────────────────────────────────────────
(async()=>{
  await loadState();
  renderOverview();
})();
</script>
<!-- PWA: install prompt banner -->
<div id="installBanner" style="display:none;position:fixed;bottom:1.5rem;right:1.5rem;z-index:200;background:#1e2535;border:1px solid #2e3a50;border-radius:12px;padding:1rem 1.25rem;box-shadow:0 8px 32px rgba(0,0,0,.5);max-width:320px;">
  <div style="font-size:13px;font-weight:700;margin-bottom:4px;">Install TeamIQ</div>
  <div style="font-size:12px;color:#8893a8;margin-bottom:12px;">Add to your desktop for quick access — works like a native app.</div>
  <div style="display:flex;gap:8px;">
    <button id="installBtn" style="flex:1;background:#0d7a57;border:1px solid #1fb885;color:#fff;padding:7px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;">Install</button>
    <button onclick="document.getElementById('installBanner').style.display='none'" style="background:transparent;border:1px solid #2e3a50;color:#8893a8;padding:7px 12px;border-radius:6px;font-size:12px;cursor:pointer;">Later</button>
  </div>
</div>

<script>
/* Service worker registration */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('SW registered', reg.scope))
      .catch(err => console.warn('SW registration failed', err));
  });
}

/* PWA install prompt */
let deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstallPrompt = e;
  // Show after 30s if user hasn't dismissed
  setTimeout(() => {
    if (deferredInstallPrompt) {
      document.getElementById('installBanner').style.display = 'block';
    }
  }, 30000);
});
document.getElementById('installBtn')?.addEventListener('click', async () => {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  const { outcome } = await deferredInstallPrompt.userChoice;
  deferredInstallPrompt = null;
  document.getElementById('installBanner').style.display = 'none';
});
window.addEventListener('appinstalled', () => {
  deferredInstallPrompt = null;
  document.getElementById('installBanner').style.display = 'none';
});

/* Open on specific tab if URL has ?tab= param */
window.addEventListener('DOMContentLoaded', () => {
  const tab = new URLSearchParams(window.location.search).get('tab');
  if (tab) setTimeout(() => setTab(tab), 800);
});
</script>
